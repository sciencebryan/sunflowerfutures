<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sunflower Futures — Phase 1</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <filter id="wobble">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="2.4"/>
  </filter>
</svg>

<header>
  <div class="masthead">
    <div class="title">Sunflower Futures</div>
    <div class="daywx" id="daywx"></div>
  </div>

  <div class="hud-vitals" id="hudVitals"></div>
  <div class="hud-line" id="hudPeople"></div>
  <div class="hud-line" id="hudMaterials"></div>

  <div class="daybar">
    <div class="daytrack"><div class="dayfill" id="dayFill" style="width:0%"></div></div>
    <button class="endday" id="endDayBtn">End the day</button>
  </div>
</header>

<nav>
  <button data-tab="village" class="on">Village<span id="evdot" style="display:none" class="evdot"></span></button>
  <button data-tab="beyond">Beyond</button>
  <button data-tab="works">Works</button>
  <button data-tab="power">Power</button>
  <button data-tab="water">Water</button>
  <button data-tab="people">People</button>
  <button data-tab="journal">Journal</button>
</nav>

<main>
  <div id="offlineBanner"></div>
  <section id="tab-village"></section>
  <section id="tab-beyond" style="display:none"></section>
  <section id="tab-works" style="display:none"></section>
  <section id="tab-power" style="display:none"></section>
  <section id="tab-water" style="display:none"></section>
  <section id="tab-people" style="display:none"></section>
  <section id="tab-journal" style="display:none"></section>
</main>

<footer>
  <button id="resetBtn">Start the village over</button>
  <div class="protonote">Phase 1 prototype: entropy, expeditions, projects, care, arrivals, choices.<br>Days pass every 2 minutes while open, and while you're away (up to 14).</div>
</footer>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"></div>

<div id="loginScreen" style="position:fixed; inset:0; z-index:100; background:var(--paper); display:flex; align-items:center; justify-content:center; padding:20px;">
  <div class="card" style="width:100%; max-width:400px; text-align:center; transform:rotate(-0.5deg);">
    <h2 class="title" style="margin-bottom: 6px;">Sunflower Futures</h2>
    <p class="flavor" style="margin-bottom: 20px;">Identify your settlement keys to access the valley.</p>
    
    <div style="margin-bottom: 12px; text-align: left;">
      <label class="outline-note" style="display:block; margin-bottom:4px;">Email Address</label>
      <input type="email" id="loginEmail" style="width:100%; padding:10px; font-family:var(--mono); border:1px solid var(--line); background:var(--paper); border-radius:4px;">
    </div>
    
    <div style="margin-bottom: 20px; text-align: left;">
      <label class="outline-note" style="display:block; margin-bottom:4px;">Secret Password</label>
      <input type="password" id="loginPassword" style="width:100%; padding:10px; font-family:var(--mono); border:1px solid var(--line); background:var(--paper); border-radius:4px;">
    </div>

    <div style="display:flex; gap:10px;">
      <button id="signInBtn" class="go ready" style="flex:1; padding:12px;">Sign In</button>
      <button id="signUpBtn" class="go" style="flex:1; padding:12px; border-color:var(--ink-soft); color:var(--ink-soft);">Register</button>
    </div>
    <div id="loginError" class="warnline" style="margin-top:12px; display:none;"></div>
  </div>
</div>

<div id="founding" style="display:none;position:fixed;inset:0;z-index:60;background:var(--paper);overflow:auto;max-width:640px;margin:0 auto;background-image:radial-gradient(ellipse 120% 60% at 50% -10%, rgba(147,164,131,.18), transparent 60%)">
  <div id="foundingBody" style="padding:28px 18px calc(30px + env(safe-area-inset-bottom))"></div>
</div>


<script type="module" src="main.js"></script>
</body>
</html>
