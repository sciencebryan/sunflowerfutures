<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>	
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sunflower Futures — Phase 1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,400;1,600&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

  :root{
    --paper: #E6E4D3;
    --paper-deep: #DCD9BD;
    --ink: #21281A;
    --ink-soft: #4F5844;
    --leaf: #44622F;
    --moss: #7D8E6C;
    --sun: #B88124;
    --water: #4C7286;
    --rust: #924624;
    --card: #EDECE0;
    --line: #B9B79E;
    --serif: "Cormorant Garamond", Georgia, serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono: "Courier Prime", ui-monospace, "SF Mono", monospace;
  }
  
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  
  html{
    background: var(--paper);
    background-image: 
      radial-gradient(ellipse 120% 60% at 50% -10%, rgba(125,142,108,.22), transparent 70%),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.005) 0px, rgba(0,0,0,0.005) 1px, transparent 1px, transparent 4px);
    background-attachment: fixed;
  }
  
  body{
    font-family: var(--sans); color: var(--ink); background: transparent;
    max-width: 640px; margin: 0 auto; min-height: 100vh;
    padding: 0 4px;
  }
  
  button{
    font-family: var(--serif); color: var(--ink); background: none; border: none; cursor: pointer;
    transition: transform 0.1s ease, filter 0.1s ease;
  }
  button:active:not(:disabled){ transform: scale(0.98) translateY(1px); }
  button:disabled{ opacity: .35; cursor: default; filter: grayscale(50%); }

  header{
    position: sticky; top: 0; z-index: 30; background: var(--paper);
    border: 3px double var(--line); border-top: none; padding: 12px 14px 10px;
    box-shadow: 0 6px 20px -10px rgba(33,40,26,.3);
  }
  .masthead{display: flex; align-items: baseline; justify-content: space-between; gap: 8px}
  .title{font-family: var(--serif); font-weight: 700; font-size: 22px; letter-spacing: .04em; text-transform: uppercase}
  .title small{font-family: var(--mono); font-weight: 400; font-size: 11px; letter-spacing: 0; color: var(--ink-soft); text-transform: lowercase; margin-left: 6px}
  .daywx{font-family: var(--serif); font-style: italic; font-weight: 600; font-size: 16px; color: var(--ink-soft)}
  
  .res-strip{display: flex; gap: 8px; margin-top: 10px}
  .res{
    flex: 1; background: var(--card); border: 1px solid var(--line); border-radius: 4px; 
    padding: 6px 8px; min-width: 0; box-shadow: inset 0 1px 3px rgba(0,0,0,0.04);
  }
  .res .lbl{font-family: var(--serif); font-weight: 600; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-soft)}
  .res .val{font-family: var(--mono); font-size: 15px; font-weight: 700; margin-top: 2px; white-space: nowrap}
  .res .sub{font-family: var(--mono); font-size: 10px; color: var(--ink-soft); white-space: nowrap; opacity: 0.85}
  .neg{color: var(--rust)} .pos{color: var(--leaf)}
  
  .daybar{display: flex; align-items: center; gap: 12px; margin-top: 10px}
  .daytrack{flex: 1; height: 6px; background: var(--paper-deep); border-radius: 3px; overflow: hidden; border: 1px solid rgba(0,0,0,0.05)}
  .dayfill{height: 100%; background: var(--sun); border-radius: 3px; transition: width 1s linear}
  
  .endday{
    font-family: var(--serif); font-weight: 600; font-size: 13.5px; letter-spacing: .04em; 
    padding: 6px 16px; border: 2px solid var(--ink-soft); border-radius: 2px; 
    color: var(--ink); background: var(--card); box-shadow: 2px 2px 0 var(--line);
  }
  .endday:active{box-shadow: 0px 0px 0 var(--line);}

  nav{display: flex; border-bottom: 2px solid var(--line); background: var(--paper); position: sticky; top: var(--navtop,0px); z-index: 29}
  nav button{
    flex: 1; padding: 11px 0 9px; font-family: var(--serif); font-size: 14px; font-weight: 600;
    letter-spacing: .05em; text-transform: uppercase; color: var(--ink-soft); border-bottom: 3px solid transparent; position: relative;
  }
  nav button.on{color: var(--ink); border-bottom-color: var(--leaf); font-weight: 700}
  nav button .evdot{position: absolute; top: 8px; right: 12px; width: 8px; height: 8px; border-radius: 50%; background: var(--rust); animation: pulse 2s infinite}

  main{padding: 16px 8px 90px}

  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 6px 4px 5px 3px/4px 6px 3px 5px; 
    padding: 14px 14px; margin-bottom: 14px; box-shadow: 1px 2px 5px rgba(33,40,26,0.06);
    position: relative;
  }
  .card.grey{opacity: .6; background: var(--paper-deep); border-style: dashed;}
  .card-top{display: flex; justify-content: space-between; align-items: baseline; gap: 8px}
  .sysname{font-family: var(--serif); font-size: 19px; font-weight: 700; letter-spacing: 0.02em}
  .condpct{font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--ink-soft)}
  .blurb{font-family: var(--serif); font-size: 14px; line-height: 1.4; color: var(--ink-soft); margin-top: 4px}

  .cbar{position: relative; height: 12px; margin: 10px 0; background: var(--paper-deep); border-radius: 2px; border: 1px solid rgba(0,0,0,0.04); overflow: hidden}
  .cbar .fill{
    position: absolute; inset: 0; right: auto; border-radius: 1px; opacity: .9; 
    transition: width .6s cubic-bezier(0.16, 1, 0.3, 1);
    background-image: linear-gradient(45deg, rgba(255,255,255,0.1) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.1) 75%, transparent 75%, transparent);
    background-size: 12px 12px;
    animation: barMove 30s linear infinite;
  }
  .c-good{background-color: var(--leaf)}
  .c-mid{background-color: var(--sun)}
  .c-bad{background-color: var(--rust)}
  .c-sun{background-color: var(--sun)}

  .sysmeta{display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 4px}
  .rolerow{display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px}
  .outline-note{font-size: 12px; font-family: var(--mono); color: var(--ink-soft)}
  
  .keeper{
    display: inline-flex; align-items: center; gap: 6px; font-family: var(--serif); font-size: 13.5px; font-weight: 600;
    border: 1px dashed var(--ink-soft); border-radius: 4px; padding: 5px 12px; background: var(--paper);
    box-shadow: 1px 1px 2px rgba(0,0,0,0.05);
  }
  .keeper.filled{border-style: solid; background: #E2E4D2; border-color: var(--leaf); padding-left: 10px}
  .keeper .dot{width: 6px; height: 6px; border-radius: 50%; background: var(--leaf)}
  .keeper.empty .dot{background: var(--rust); animation: pulse 2.5s infinite}
  .keeper .role{font-family: var(--mono); font-size: 10px; font-weight: 400; letter-spacing: .05em; text-transform: uppercase; color: var(--ink-soft); margin-right: 2px}
  .warnline{font-size: 13.5px; color: var(--rust); margin-top: 8px; font-style: italic; font-family: var(--serif); font-weight: 600}

  .evcard{
    border: 2px solid var(--sun); background: #FAF5E6; 
    transform: rotate(-0.5deg); box-shadow: 3px 5px 15px rgba(184,129,36,0.12);
  }
  .evtitle{font-family: var(--serif); font-size: 20px; font-weight: 700; color: var(--rust)}
  .evtext{font-family: var(--serif); font-style: italic; font-size: 15.5px; line-height: 1.5; margin: 8px 0 12px; color: var(--ink)}
  
  .evopt{
    display: block; width: 100%; text-align: left; padding: 10px 14px; border: 1px solid var(--line); 
    border-radius: 4px; margin-bottom: 8px; background: var(--card); box-shadow: 1px 2px 0 var(--line);
  }
  .evopt:active{box-shadow: 0px 0px 0 var(--line); transform: translateY(2px);}
  .evopt .l1{font-family: var(--serif); font-weight: 700; font-size: 15px}
  .evopt .l2{font-family: var(--sans); font-size: 12px; color: var(--ink-soft); margin-top: 2px}

  .pcard{display: block; width: 100%; text-align: left; text-decoration: none;}
  .pname{font-family: var(--serif); font-size: 18px; font-weight: 700}
  .pn{font-family: var(--serif); font-style: italic; font-size: 13px; color: var(--ink-soft); font-weight: 400; margin-left: 6px}
  .trait{font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--paper); background: var(--ink-soft); border-radius: 3px; padding: 2px 6px; vertical-align: 2px}
  .skills{font-family: var(--mono); font-size: 12px; color: var(--ink-soft); margin-top: 6px; line-height: 1.6}
  
  .wbwrap{display: flex; align-items: center; gap: 8px; margin-top: 8px}
  .wbtrack{flex: 1; height: 8px; background: var(--paper-deep); border-radius: 4px; position: relative; border: 1px solid rgba(0,0,0,0.03)}
  .wbfill{position: absolute; inset: 0; right: auto; border-radius: 4px; opacity: .9}
  .wbnum{font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--ink-soft); width: 28px; text-align: right}

  .passign{font-family: var(--serif); font-size: 13.5px; margin-top: 8px; border-top: 1px dashed var(--line); padding-top: 6px}
  .passign b{font-weight: 700; color: var(--leaf)}
  .flavor{font-family: var(--serif); font-style: italic; font-size: 13px; color: var(--ink-soft); margin-top: 5px}
  .mem{font-family: var(--serif); font-style: italic; font-size: 12.5px; color: var(--rust); margin-top: 4px; font-weight: 600}
  
  .status-badge{font-family: var(--mono); font-size: 9.5px; text-transform: uppercase; color: var(--rust); border: 1px solid var(--rust); border-radius: 3px; padding: 1px 6px; margin-left: 6px; vertical-align: 2px}
  .status-badge.away{color: var(--water); border-color: var(--water)}
  
  .legend{
    font-family: var(--serif); font-size: 14px; color: var(--ink-soft); line-height: 1.6; 
    margin-bottom: 16px; padding: 10px 12px; background: var(--card); border: 1px solid var(--line); 
    border-radius: 4px; border-left: 4px solid var(--ink-soft);
  }
  .legend b{font-family: var(--mono); font-size: 12px; color: var(--ink)}

  .jentry{margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px dashed var(--line)}
  .jday{font-family: var(--mono); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 6px}
  .jlines{font-family: var(--serif); font-style: italic; font-size: 16px; line-height: 1.5; color: var(--ink)}
  .jlines p{margin-bottom: 4px}

  .scrim{position: fixed; inset: 0; background: rgba(33,40,26,.45); z-index: 40; display: none; backdrop-filter: blur(1px)}
  .scrim.open{display: block}
  
  .sheet{
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 41; max-width: 640px; margin: 0 auto; 
    background: var(--paper); border: 3px double var(--line); border-bottom: none; border-radius: 12px 12px 0 0; 
    padding: 16px 16px calc(16px + env(safe-area-inset-bottom)); max-height: 80vh; overflow: auto; 
    transform: translateY(105%); transition: transform .25s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 -10px 30px rgba(0,0,0,0.15);
  }
  .sheet.open{transform: translateY(0)}
  .sheet h3{font-family: var(--serif); font-size: 20px; font-weight: 700; margin-bottom: 4px}
  .sheet .sub{font-family: var(--serif); font-size: 14px; color: var(--ink-soft); margin-bottom: 12px}
  
  .opt{
    display: flex; justify-content: space-between; align-items: center; width: 100%; text-align: left; 
    padding: 11px 12px; border: 1px solid var(--line); border-radius: 4px; margin-bottom: 8px; 
    background: var(--card); box-shadow: 1px 1px 2px rgba(0,0,0,0.03);
  }
  .opt:active{background: var(--paper-deep)}
  .opt .l1{font-family: var(--serif); font-weight: 700; font-size: 16px}
  .opt .l2{font-family: var(--sans); font-size: 11.5px; color: var(--ink-soft); margin-top: 2px}
  .opt .r{font-family: var(--mono); font-size: 12px; color: var(--ink-soft); text-align: right; white-space: nowrap}
  .opt.dim{opacity: .45}
  .opt.current{border-color: var(--leaf); background: #E1E4D0; border-width: 2px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);}
  
  .confirm{
    display: block; width: 100%; text-align: center; padding: 12px; border-radius: 4px; 
    background: var(--leaf); color: var(--paper); font-family: var(--serif); font-weight: 700; 
    font-size: 16px; letter-spacing: .04em; margin-top: 8px; box-shadow: 0 4px 10px rgba(68,98,47,0.2);
  }
  .confirm:disabled{background: var(--moss); box-shadow: none}

  .banner{
    background: #E1E4D0; border: 1px solid var(--moss); border-left: 4px solid var(--leaf); 
    border-radius: 4px; padding: 10px 14px; font-family: var(--serif); font-size: 15px; margin-bottom: 14px;
    line-height: 1.45;
  }
  .sectionlbl{font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-soft); margin: 20px 2px 10px}
  
  .chips{display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px}
  .chip{font-family: var(--mono); font-size: 12px; font-weight: 700; background: var(--card); border: 1px solid var(--line); border-radius: 4px; padding: 4px 10px}
  
  .costchips{display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px}
  .cost{font-family: var(--mono); font-size: 11px; border: 1px solid var(--line); border-radius: 3px; padding: 2px 6px; color: var(--ink-soft); background: rgba(0,0,0,0.01)}
  .cost.short{color: var(--rust); border-color: var(--rust); background: rgba(146,70,36,0.05); font-weight: 700}
  
  .go{
    font-family: var(--serif); font-weight: 700; font-size: 13px; letter-spacing: .02em; 
    padding: 5px 14px; border: 1px solid var(--leaf); border-radius: 3px; color: var(--leaf); 
    background: var(--paper); box-shadow: 1px 1px 0 var(--leaf);
  }
  .go:active{box-shadow: 0 0 0 transparent; transform: translateY(1px);}
  .go.ready{background: var(--leaf); color: var(--paper); border-color: var(--leaf); box-shadow: 1px 2px 4px rgba(68,98,47,0.25)}
  .go.ready:active{background: #354d25}
  
  .card.buildable{border-left: 4px solid var(--leaf)}
  .card.buildable .sysname::after{content: " · choice open"; font-family: var(--serif); font-style: italic; font-size: 13px; font-weight: 500; color: var(--leaf); margin-left: 6px}

  /* ---------- puzzles ---------- */
  .pzhead{display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 4px}
  .pzteach{font-family: var(--serif); font-style: italic; font-size: 14.5px; color: var(--ink-soft); margin: 4px 0 12px; line-height: 1.45}
  .grid{display: grid; gap: 4px; justify-content: center; margin: 14px 0; background: rgba(0,0,0,0.02); padding: 6px; border-radius: 6px; border: 1px solid var(--line)}
  
  .cell{
    position: relative; background: var(--paper-deep); border: 1px solid var(--line); border-radius: 4px;
    display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 11px; color: var(--ink-soft);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.05); transition: background-color 0.15s ease, border-color 0.15s ease;
  }
  .cell.on{background: #CCD4BD; border-color: var(--leaf); color: var(--ink)}
  .cell.over{background: #E2B9A6; border-color: var(--rust); color: var(--rust); animation: shiver 0.3s linear infinite}
  .cell.blk{background: #2D3327; border-color: #2D3327; box-shadow: none}
  .cell.src{background: var(--sun); border-color: #926416; color: #fff; font-weight: 700; box-shadow: 0 2px 4px rgba(184,129,36,0.3)}
  .cell.load{background: #C4D3DC; border-color: var(--water); color: #1F3642; font-weight: 700}
  .cell.load.lit{background: #A9C299; border-color: var(--leaf); color: #223714; box-shadow: 0 0 8px rgba(68,98,47,0.2)}
  .cell.jcold{background: #E1D5B7; border-color: var(--sun); border-style: dashed; color: #6E5118}
  .cell.jopen{background: #D0BE79; border-color: var(--sun); color: #44320E; font-weight: 700; box-shadow: 0 0 6px rgba(184,129,36,0.15)}
  .cell.bed{background: #C1D0B5; border-color: var(--leaf)}
  .cell.bed.dry{background: #DFD7B7; border-color: var(--sun)}
  .cell.bed.drown{background: #DCA993; border-color: var(--rust)}
  .cell .amp{position: absolute; top: 2px; right: 4px; font-size: 9px; opacity: .85; font-weight: 700}
  .cell .cap{position: absolute; bottom: 2px; left: 4px; font-size: 9px; opacity: .7}
  .cell .glyph{font-size: 16px; line-height: 1}
  .cell .elev{position: absolute; top: 2px; left: 4px; font-size: 9px; opacity: .6}
  
  .pieces{display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0}
  .piece{
    border: 1px solid var(--line); border-radius: 4px; padding: 6px 12px; background: var(--card); 
    font-family: var(--serif); font-size: 14px; font-weight: 600; box-shadow: 1px 1px 2px rgba(0,0,0,0.04);
  }
  .piece.sel{border-color: var(--leaf); background: #E1E4D0; font-weight: 700; border-width: 2px}
  .piece.out{opacity: .35; box-shadow: none}
  .pzstatus{font-family: var(--serif); font-style: italic; font-size: 14.5px; font-weight: 600; margin-top: 8px; min-height: 20px}
  .pzstatus.good{color: var(--leaf)} .pzstatus.bad{color: var(--rust)}
  
  .pzbar{display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap}
  .pzbar button{font-family: var(--serif); font-size: 13px; font-weight: 600; padding: 6px 14px; border: 1px solid var(--ink-soft); border-radius: 3px; background: var(--card)}
  
  .loadlist{font-size: 12px; color: var(--ink-soft); font-family: var(--mono); line-height: 1.6; margin-top: 6px}
  .loadlist .sel{color: var(--leaf); font-weight: 700}
  .done{font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--leaf); border: 1px solid var(--leaf); border-radius: 3px; padding: 1px 6px}
  .bannerx{margin-left: 8px; font-family: var(--sans); font-size: 11px; padding: 2px 10px; border: 1px solid var(--ink-soft); border-radius: 2px; background: var(--card); cursor: pointer}
  
  footer{padding: 12px 14px 30px; text-align: center; border-top: 1px dashed var(--line); margin-top: 20px}
  footer button{font-family: var(--mono); font-size: 11px; letter-spacing: .05em; text-transform: uppercase; color: var(--ink-soft); text-decoration: underline}
  .protonote{font-family: var(--serif); font-size: 13px; color: var(--ink-soft); margin-top: 12px; line-height: 1.5}

  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); opacity: 0.9; }
  }
  @keyframes barMove {
    from { background-position: 0 0; }
    to { background-position: 360px 0; }
  }
  @keyframes shiver {
    0% { transform: translate(0, 0); }
    25% { transform: translate(0.5px, -0.5px); }
    50% { transform: translate(-0.5px, 0.5px); }
    75% { transform: translate(0.5px, 0.5px); }
    100% { transform: translate(0, 0); }
  }
  
  @media (max-width:480px), (pointer:coarse), (prefers-reduced-motion:reduce){
    .cbar .fill { animation: none; filter: none; }
    .cell.over { animation: none; }
    button:active:not(:disabled) { transform: none; }
  }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <filter id="wobble">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="2.4"/>
  </filter>
</svg>

<header>
  <div class="masthead">
    <div class="title">Sunflower Futures<small>Phase 1</small></div>
    <div class="daywx" id="daywx">Day 1 · clear</div>
  </div>
  <div class="res-strip" id="resStrip"></div>
  <div class="daybar">
    <div class="daytrack"><div class="dayfill" id="dayFill" style="width:0%"></div></div>
    <button class="endday" id="endDayBtn">End the day</button>
  </div>
</header>

<nav>
  <button data-tab="village" class="on">Village<span id="evdot" style="display:none" class="evdot"></span></button>
  <button data-tab="beyond">Beyond</button>
  <button data-tab="works">Works</button>
  <button data-tab="people">People</button>
  <button data-tab="journal">Journal</button>
</nav>

<main>
  <div id="offlineBanner"></div>
  <section id="tab-village"></section>
  <section id="tab-beyond" style="display:none"></section>
  <section id="tab-works" style="display:none"></section>
  <section id="tab-people" style="display:none"></section>
  <section id="tab-journal" style="display:none"></section>
</main>

<footer>
  <button id="resetBtn">Start the village over</button>
  <div class="protonote">Phase 1 prototype: entropy, expeditions, projects, care, arrivals, choices.<br>Days pass every 2 minutes while open, and while you're away (up to 14).</div>
</footer>

<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet"></div>

<div id="loginScreen" style="position:fixed; inset:0; z-index:100; background:var(--paper); display:flex; align-items:center; justify-content:center; padding:20px;">
  <div class="card" style="width:100%; max-width:400px; text-align:center; transform:rotate(-0.5deg);">
    <h2 class="title" style="margin-bottom: 6px;">Sunflower Futures</h2>
    <p class="flavor" style="margin-bottom: 20px;">Identify your settlement keys to access the valley.</p>

  mem: null,

  // Helper to quickly grab the logged-in user's ID from Supabase
  async getUserId() {
    const { data: { user } } = await supabase.auth.getUser();
    return user ? user.id : null;
  },

  async load() {
    try {
      const uid = await this.getUserId();
      
      // If there is no logged-in user, fall back to temporary in-memory state
      if (!uid) return this.mem;

      // Query the database for this user's row.
      // We use .maybeSingle() because if it's their first time playing, 
      // there won't be a row yet, and we want it to return null gracefully.
      const { data, error } = await supabase
        .from('player_saves')
        .select('game_state')
        .eq('user_id', uid)
        .maybeSingle();

      if (error) throw error;

      if (data && data.game_state) {
        this.mem = data.game_state;
        return this.mem;
      }
      
      return null; // Triggers your openFounding() screen for a fresh game
    } catch (e) {
      console.error("Cloud load failed, falling back to memory:", e);
      return this.mem;
    }
  },

  async save(s) {
    this.mem = s;
    try {
      const uid = await this.getUserId();
      if (!uid) return; // If not logged in, we can't save to the cloud

      // upsert will automatically insert a new row OR update the existing row 
      // because we made user_id a UNIQUE key constraint in the database!
      const { error } = await supabase
        .from('player_saves')
        .upsert(
          { user_id: uid, game_state: s },
          { onConflict: 'user_id' }
        );

      if (error) throw error;
    } catch (e) {
      console.error("Cloud save failed:", e);
    }
  },

  async clear() {
    this.mem = null;
    try {
      const uid = await this.getUserId();
      if (!uid) return;

      const { error } = await supabase
        .from('player_saves')
        .delete()
        .eq('user_id', uid);

      if (error) throw error;
    } catch (e) {
      console.error("Cloud delete failed:", e);

  }

/* ============================================================
   RESTORATION — three ecological metrics, 0..100 each, that
   the late game turns on. NOT a score to climb: a system with
   coupling and two tipping points, so it behaves like land.

     mycosphere  the living soil web   — fed by native perennials + compost
     aquifer     the water table       — fed by watershed puzzle/projects
     pollinator  the wild bloom        — fed by wildflower meadow plots

   COUPLING (few, strong, named — so a player can learn them):
     • soil<->water: mycosphere and aquifer reinforce each other.
       high water shields soil from drought decay; high soil holds
       water against runoff. together they are the stable core.
     • the living valley: pollinator is pulled toward min(soil,water)
       each season. it rises only as fast as its supports allow, and
       FALLS when they fail — pollinators die without flowers + water.
       this one rule is the whole tipping/cascade behaviour.

   TIPPING POINTS (feedback the player feels):
     • self-sustaining, above HIGH: a metric climbs a little on its
       own — the system has "caught". makes the finish line a stable
       state, not a plate to spin forever.
     • erosion, below LOW: a metric slides unless a coupled metric
       props it up. early restoration must be actively worked or it
       won't stick. below/above the same threshold IS the decay
       question — it decays when low+neglected, holds when high.

   Effects wired into existing threats:
     mycosphere -> blight roll down     (line: 0.012*n)
     aquifer    -> storm chance+damage down, drought softened
     pollinator -> garden yield up + a small standing morale floor
   ============================================================ */
const RESTORE_HIGH = 60;   // self-sustaining tipping point
const RESTORE_LOW  = 25;   // erosion tipping point
const RESTORE_GATE = 80;   // all three above this = valley restored (Phase 4)
// per-action inputs (applied when the action happens)
const RESTORE_IN = {
  nativePlant: 8,   // planting a native perennial in a forest plot
  meadowPlot:  12,  // dedicating a plot to wildflower meadow
  compost:     2,   // a compost spread event onto a worn plot
  waterLevel:  9,   // solving one watershed puzzle level
  waterProject:7    // completing a water-restoration project
};

function ensureRestore(s){
  if(!s.restore) s.restore = {mycosphere:0, aquifer:0, pollinator:0, seen:false, restored:false};
  return s.restore;
}
// push a metric up from anywhere an action happens; flips `seen` so the panel
// appears the first time the player does anything restorative.
function addRestore(metric, amount){
  const r = ensureRestore(S);
  r[metric] = clamp((r[metric]||0) + amount, 0, 100);
  r.seen = true;
}
// the seasonal update: coupling + tipping, run once per season.
function stepRestoration(lines){
  const r = ensureRestore(S);
  if(!r.seen) return;   // nothing planted/restored yet — engine dormant
  const M=r.mycosphere, A=r.aquifer, P=r.pollinator;
  const was = {M,A,P};

  // coupling: soil<->water reinforce; each shields the other from decay
  const support = v => v>=RESTORE_HIGH ? 1.5 : v<=RESTORE_LOW ? -1.5 : 0;
  let dM = support(A);   // water feeds soil
  let dA = support(M);   // soil holds water
  // the living valley: pollinator pulled toward its supports' floor
  const floor = Math.min(M, A);
  let dP = (floor - P) * 0.15;   // rises toward, and falls toward, min(soil,water)

  // tipping: self-sustaining above HIGH, erosion below LOW
  const tip = v => v>=RESTORE_HIGH ? +2 : (v<=RESTORE_LOW && v>0 ? -1.5 : 0);
  dM += tip(M); dA += tip(A); dP += tip(P);

  // gentle neglect drift — only bites in the mid-band where nothing self-sustains
  const drift = -0.6;
  dM += drift; dA += drift; dP += drift;

  r.mycosphere = clamp(M+dM, 0, 100);
  r.aquifer    = clamp(A+dA, 0, 100);
  r.pollinator = clamp(P+dP, 0, 100);

  // legible journal beats at the tipping points, not every season
  const up   = (v0,v1)=> v0<RESTORE_HIGH && v1>=RESTORE_HIGH;
  const down = (v0,v1)=> v0>=RESTORE_LOW && v1<RESTORE_LOW;
  if(up(was.M,r.mycosphere)) lines.push("The soil has turned a corner. Dig anywhere and it's dark, and it smells alive — it holds itself together now.");
  if(up(was.A,r.aquifer))    lines.push("The water table has come back up. The low ground stays damp through the dry weeks, the way the old people said it used to.");
  if(up(was.P,r.pollinator)) lines.push("The valley hums. Bees no one keeps, in flowers no one planted for food — the bloom has caught on its own.");
  if(down(was.M,r.mycosphere)) lines.push("The bare ground is washing thin again. Without more rooted in it, the soil won't stay.");
  if(down(was.P,r.pollinator)) lines.push("The blooms are thinning. Nothing holds the pollinators if the soil and water beneath them fail.");

  // the gate: all three restored
  if(!r.restored && r.mycosphere>=RESTORE_GATE && r.aquifer>=RESTORE_GATE && r.pollinator>=RESTORE_GATE){
    r.restored = true;
    lines.push("Someone stood on the ridge at dusk and couldn't tell, for a moment, where the village ended and the woods began. The valley is whole. Whatever comes next, it comes from a place that can hold it.");
  }
}

const waterCapEff=()=>(S.waterCap||80)+(S.flags.cutCistern?12:0);
const built=id=>!!(S.sys[id] && S.sys[id].built);
// The depot only holds so much: scrap and parts stop accumulating past a cap
// generous enough to save for the biggest single project several times over
// (largest costs in the game are 20 scrap / 12 parts), but bounded so a long
// game doesn't drift into the hundreds with nothing to spend it on. Food,
// water, and seeds aren't capped here — they're already bounded by spoilage,
// tank size, and regular sowing respectively.
const RES_CAP = {scrap:120, parts:60};
function addRes(k, amt){
  if(amt<=0) return 0;
  const cap = RES_CAP[k];
  if(cap===undefined){ S.res[k]=(S.res[k]||0)+amt; return amt; }
  const room = Math.max(0, cap-(S.res[k]||0));
  const actual = Math.min(amt, room);
  S.res[k] = (S.res[k]||0)+actual;
  return actual;
}
// Wear per day for a built system, after upgrades and stacking. The ONLY place
// this is computed — both the daily tick and the village card read it, so the
// displayed "wears −n" can never drift from what actually happens.
function decayOf(d){
  const F=S.flags;
  let base=d.decay;
  if(d.id==="turbine"&&F.bearings) base=2.2;
  if(d.id==="solar"&&F.panelWash) base=1.2;
  if(d.id==="irrigation"&&F.dripRetrofit) base=1.5;
  if(d.id==="turbine") base *= (1 + 0.03*((S.turbines||1)-1));   // one keeper minds them all; more turbines add only slight upkeep
  if(d.id==="solar")   base *= (1 + 0.03*((S.solarPanels||1)-1));
  if(d.id==="battery") base *= (1 + 0.03*((S.batteries||1)-1));
  if(F.relayGrid) base*=0.9;
  return base;
}
// whether a gated SYS/PROJECT entry should appear in the build menu at all.
// See the gate comment above PROJECTS for the three gate kinds.
function isVisible(entry){
  const g=entry.gate;
  if(!g) return true;
  if(g.sys && !built(g.sys)) return false;
  if(g.flag && !S.flags[g.flag]) return false;
  if(g.discover && !(S.discovered && S.discovered[entry.id])) return false;
  if(g.crop && !(S.crops && S.crops[g.crop]) && !(CROPS[g.crop] && !CROPS[g.crop].locked)) return false;
  return true;
}

function circuitCap(L,x,y){
  if(L.blocked.some(b=>b[0]===x&&b[1]===y)) return 0;
  if(L.caps && L.caps[x+","+y]!==undefined) return L.caps[x+","+y];
  return 99;
}
function cKey(x,y){return x+","+y;}
function circuitAdj(a,b){return Math.abs(a[0]-b[0])+Math.abs(a[1]-b[1])===1;}

/* current on each cell = sum of amps of every path crossing it */
function circuitLoadMap(L, paths){
  const m={};
  for(const ld of L.loads){
    const path=paths[ld.name];
    if(!path||path.length<2) continue;
    for(const c of path) m[cKey(c[0],c[1])]=(m[cKey(c[0],c[1])]||0)+ld.amps;
  }
  return m;
}
function pathValid(L, ld, p){
  if(!p || p.length<2) return false;
  if(p[0][0]!==L.src[0] || p[0][1]!==L.src[1]) return false;         // must start at the bus
  const end=p[p.length-1];
  if(end[0]!==ld.p[0] || end[1]!==ld.p[1]) return false;             // must reach the load
  const seen=new Set();
  for(let i=0;i<p.length;i++){
    const k=cKey(p[i][0],p[i][1]);
    if(seen.has(k)) return false;                                     // no doubling back
    seen.add(k);
    if(circuitCap(L,p[i][0],p[i][1])===0) return false;               // no burnt cells
    if(i>0 && !circuitAdj(p[i-1],p[i])) return false;                 // contiguous
  }
  return true;
}
function circuitCheck(L, paths){
  const live={};
  for(const ld of L.loads) if(pathValid(L,ld,paths[ld.name])) live[ld.name]=paths[ld.name];
  const m=circuitLoadMap(L,live);
  const over=[];
  for(const k in m){ const [x,y]=k.split(",").map(Number); if(m[k]>circuitCap(L,x,y)) over.push(k); }
  let total=0;
  for(const ld of L.loads) if(live[ld.name]) total+=ld.amps;
  const missing=L.loads.filter(l=>l.req && !live[l.name]).map(l=>l.name);
  // junctions: relay cells that must carry AT LEAST a minimum current to energize
  const coldJunctions=[];
  if(L.junctions){
    for(const [k,need] of Object.entries(L.junctions)){
      if((m[k]||0) < need) coldJunctions.push(k);
    }
  }
  return {map:m, live, over, total, overSource: total>L.srcMax, missing, coldJunctions,
          solved: over.length===0 && total<=L.srcMax && missing.length===0 && coldJunctions.length===0};
}

const SCOUR_LIMIT=9;   // a channel carrying more than this scours

/* deterministic season sim: process cells high to low */
function waterSim(L, placed){
  const W=L.w,H=L.h;
  const el=(x,y)=>L.elev[y][x] + (placed[cKey(x,y)]==="berm"?3:0);
  const cells=[];
  for(let y=0;y<H;y++)for(let x=0;x<W;x++)cells.push([x,y]);
  cells.sort((a,b)=>el(b[0],b[1])-el(a[0],a[1]));

  const water={}, received={}, stored={}, scoured=[];
  const arrive={}, dirs={};
  let flooded=[];
  for(const [x,y] of cells){ water[cKey(x,y)]=L.rain; arrive[cKey(x,y)]=L.rain; }

  const bedAt=(x,y)=>L.beds.find(b=>b.p[0]===x&&b.p[1]===y);

  for(const [x,y] of cells){
    const k=cKey(x,y);
    let w=water[k]||0;
    if(w<=0) continue;
    const piece=placed[k];

    if(piece==="swale"){ const drink=Math.min(4,w); w-=drink; }
    if(piece==="cistern"){ const keep=Math.min(8,w); stored[k]=keep; w-=keep; }
    const bed=bedAt(x,y);
    if(bed){
      received[k]=(received[k]||0)+w;        // the bed gets everything that arrives
      w = Math.max(0, w - bed.max);          // it can only drink so much; the rest runs on
    }
    const isCh = piece && piece.startsWith("channel");
    if(isCh && L.scour && (water[k]||0)>SCOUR_LIMIT) scoured.push(k);

    if(w<=0) continue;
    // find downhill neighbours
    const nbrs=[[x+1,y],[x-1,y],[x,y+1],[x,y-1]].filter(([a,b])=>a>=0&&b>=0&&a<W&&b<H);
    const here=el(x,y);
    let downs=nbrs.filter(([a,b])=>el(a,b)<here);
    if(isCh && downs.length){
      // a channel sends it all one way — the way you cut it, if that way is downhill
      const dir=piece.split(":")[1];
      const D={E:[1,0],W:[-1,0],S:[0,1],N:[0,-1]}[dir];
      if(D){
        const t=[x+D[0],y+D[1]];
        const ok=downs.find(d=>d[0]===t[0]&&d[1]===t[1]);
        downs = ok ? [ok] : [downs.sort((p,q)=>el(p[0],p[1])-el(q[0],q[1]))[0]];
      } else downs=[downs.sort((p,q)=>el(p[0],p[1])-el(q[0],q[1]))[0]];
    }
    if(!downs.length){
      const onEdge = x===0||y===0||x===W-1||y===H-1;
      if(!onEdge && w>6) flooded.push(k);   // an interior sink with nowhere to go
      continue;                              // at the edge, it leaves the watershed
    }
    const share=w/downs.length;
    dirs[k]=downs.map(([a,b])=>a>x?"E":a<x?"W":b>y?"S":"N");
    for(const [a,b] of downs){ water[cKey(a,b)]=(water[cKey(a,b)]||0)+share; arrive[cKey(a,b)]=(arrive[cKey(a,b)]||0)+share; }
  }

  const bedResults=L.beds.map(b=>{
    const got=received[cKey(b.p[0],b.p[1])]||0;
    return {...b, got, ok: got>=b.min && got<=b.max, dry: got<b.min, drowned: got>b.max};
  });
  const totalStored=Object.values(stored).reduce((a,b)=>a+b,0);
  return {
    beds:bedResults, stored, totalStored, scoured, flooded, arrive, dirs,
    solved: bedResults.every(b=>b.ok) && totalStored>=L.cisternTarget && flooded.length===0 && scoured.length===0
  };
}

/* ================= seed frame (third puzzle) =================
   A sorting/germination frame. Each cell has a light value (0-3) from where
   it sits under the eaves. Each seed type wants a light range. Some seeds are
   companions (must sit next to at least one of their partner) and some are
   rivals (must never sit orthogonally adjacent). Fill every marked slot,
   honour light, companions, and rivals. Constraint satisfaction — a different
   shape of thinking from routing (circuit) or flow (water).             */

const SEEDLINGS = {
  bean:   {name:"Beans",   glyph:"◗", light:[2,3]},
  corn:   {name:"Corn",    glyph:"↑", light:[2,3]},
  squash: {name:"Squash",  glyph:"❍", light:[1,3]},
  root:   {name:"Roots",   glyph:"▼", light:[0,2]},
  herb:   {name:"Herbs",   glyph:"✦", light:[1,3]},
  bramble:{name:"Bramble", glyph:"※", light:[0,2]}
};

/* companion / rival pairs (order-independent) */
const SEED_COMPANION = [["bean","corn"],["squash","corn"],["herb","root"]];
const SEED_RIVAL     = [["bean","herb"],["bramble","corn"],["bramble","squash"],["root","bramble"]];

function pairHas(list,a,b){ return list.some(p=>(p[0]===a&&p[1]===b)||(p[0]===b&&p[1]===a)); }
function areCompanions(a,b){ return pairHas(SEED_COMPANION,a,b); }
function areRivals(a,b){ return pairHas(SEED_RIVAL,a,b); }

/* Levels: `slots` are the cells to fill, each {p:[x,y], light}. `supply` is
   how many of each seed you have. Solvable states honour every constraint. */

    slots:[{p:[1,1],light:3},{p:[2,3],light:3},{p:[0,3],light:0},{p:[3,1],light:2},{p:[3,0],light:2},{p:[1,0],light:2},{p:[0,0],light:0},{p:[2,2],light:2},{p:[1,2],light:3}],

function seedSlotAt(L,x,y){ return L.slots.find(s=>s.p[0]===x&&s.p[1]===y); }
function seedAdj(a,b){ return Math.abs(a[0]-b[0])+Math.abs(a[1]-b[1])===1; }

/* placed: { "x,y": seedId }. Returns a full diagnosis. */
function seedCheck(L, placed){
  const filled = L.slots.filter(s=>placed[cKey(s.p[0],s.p[1])]);
  const empties = L.slots.filter(s=>!placed[cKey(s.p[0],s.p[1])]);

  // supply respected?
  const used={};
  for(const s of L.slots){ const id=placed[cKey(s.p[0],s.p[1])]; if(id) used[id]=(used[id]||0)+1; }
  const overSupply=[];
  for(const id in used) if(used[id] > (L.supply[id]||0)) overSupply.push(id);

  // light violations
  const wrongLight=[];
  for(const s of L.slots){
    const id=placed[cKey(s.p[0],s.p[1])];
    if(!id) continue;
    const [lo,hi]=SEEDLINGS[id].light;
    if(s.light<lo || s.light>hi) wrongLight.push(cKey(s.p[0],s.p[1]));
  }

  // rival adjacencies
  const rivalPairs=[];
  for(const s of L.slots){
    const id=placed[cKey(s.p[0],s.p[1])];
    if(!id) continue;
    for(const [dx,dy] of [[1,0],[0,1]]){    // check each edge once
      const nx=s.p[0]+dx, ny=s.p[1]+dy;
      const n=placed[cKey(nx,ny)];
      if(n && areRivals(id,n)) rivalPairs.push(cKey(s.p[0],s.p[1])+"|"+cKey(nx,ny));
    }
  }

  // companion satisfaction: any seed that HAS a companion type present in the
  // level's supply must sit next to at least one of that companion type.
  const lonely=[];
  for(const s of L.slots){
    const id=placed[cKey(s.p[0],s.p[1])];
    if(!id) continue;
    const partners = SEED_COMPANION.filter(p=>p.includes(id)).map(p=>p[0]===id?p[1]:p[0]);
    // only require a companion if that partner is actually in play this level
    const need = partners.filter(pt=>(L.supply[pt]||0)>0);
    if(!need.length) continue;
    let satisfied=false;
    for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const n=placed[cKey(s.p[0]+dx,s.p[1]+dy)];
      if(n && need.includes(n)){ satisfied=true; break; }
    }
    if(!satisfied) lonely.push(cKey(s.p[0],s.p[1]));
  }

  const solved = empties.length===0 && overSupply.length===0 &&
                 wrongLight.length===0 && rivalPairs.length===0 && lonely.length===0;
  return { filled:filled.length, total:L.slots.length, empties, overSupply,
           wrongLight, rivalPairs, lonely, used, solved };
}

/* ============================================================
   SIGNAL — tuning the antenna
   Additive field placement. Each node broadcasts +1 signal to its own cell
   and the four cells orthogonally next to it; overlapping fields add. Every
   receiver must land on its exact target — no more, no less — inside a hard
   node budget. A genuinely different shape of thinking from the other three:
   not routing, not flow, not supply-and-adjacency, but overlapping coverage
   under an exact-match constraint.
   ============================================================ */
const SIGNAL_LEVELS = [
  { n:1, w:4, h:3, teach:"The valley radio. A node broadcasts +1 to itself and the four cells around it. Match the receiver exactly.",
    receivers:[{x:2,y:1,v:1}], blocked:[], budget:1 },
  { n:2, w:4, h:4, teach:"Fields add. This receiver needs 2 — two nodes have to reach it.",
    receivers:[{x:1,y:1,v:2}], blocked:[[1,1]], budget:2 },
  { n:3, w:5, h:4, teach:"Two voices now, and a strut in the way — nodes can't sit on a receiver or a blocked cell.",
    receivers:[{x:1,y:1,v:2},{x:3,y:2,v:1}], blocked:[[1,1],[3,2],[2,2]], budget:3 },
  { n:4, w:5, h:5, teach:"The static is thick here. A lot of signal into a tight space.",
    receivers:[{x:2,y:2,v:4}], blocked:[[2,2],[0,0],[4,4]], budget:4 },
  { n:5, w:6, h:5, teach:"Long distance tuning. A node in the right spot can serve two receivers at once.",
    receivers:[{x:1,y:2,v:2},{x:3,y:2,v:2},{x:5,y:0,v:1}], blocked:[[1,1],[3,1]], budget:4 },
  { n:6, w:7, h:5, teach:"The last frequency. Every node has to pull double duty to reach this far.",
    receivers:[{x:1,y:2,v:2},{x:3,y:2,v:3},{x:5,y:2,v:2}], blocked:[[3,1]], budget:5 }
];
function signalCheck(L, placed){
  const map={};
  for(const k of Object.keys(placed)){
    const [x,y]=k.split(",").map(Number);
    for(const [px,py] of [[x,y],[x+1,y],[x-1,y],[x,y+1],[x,y-1]]){
      if(px>=0 && px<L.w && py>=0 && py<L.h){ const pk=cKey(px,py); map[pk]=(map[pk]||0)+1; }
    }
  }
  const recStatus=L.receivers.map(r=>{
    const got=map[cKey(r.x,r.y)]||0;
    return {...r, got, match:got===r.v, under:got<r.v, over:got>r.v};
  });
  const used=Object.keys(placed).length;
  const solved = recStatus.every(r=>r.match) && used<=L.budget;
  return {map, recStatus, used, solved};
}

/* ============================================================
   PATCHWORK — insulation & sealing
   Polyomino packing. Cover every leak cell with a supply of fixed-shape
   patches; nothing may overlap another patch or a load-bearing strut. A
   spatial-fit puzzle, unlike anything else on the bench.
   ============================================================ */
const PATCH_SHAPES = {
  p1:{name:"1×1 patch", pts:[[0,0]]},
  h2:{name:"2×1 strip",  pts:[[0,0],[1,0]]},
  v2:{name:"1×2 strip",  pts:[[0,0],[0,1]]},
  h3:{name:"3×1 strip",  pts:[[0,0],[1,0],[2,0]]},
  v3:{name:"1×3 strip",  pts:[[0,0],[0,1],[0,2]]},
  sq:{name:"2×2 tarp",   pts:[[0,0],[1,0],[0,1],[1,1]]},
  corner:{name:"Corner", pts:[[0,0],[1,0],[0,1]]},
  tee:{name:"T-patch",   pts:[[0,0],[1,0],[2,0],[1,1]]}
};
const PATCH_LEVELS = [
  { n:1, w:4, h:3, teach:"The catchment tank has a crack. Cover the gap completely — patches can't overlap.",
    leaks:[[1,1],[2,1]], blocked:[[0,0],[3,2]], supply:{h2:1, p1:1} },
  { n:2, w:4, h:4, teach:"Struts, the dark cells, are load-bearing. You can't patch over them.",
    leaks:[[1,1],[1,2],[2,2]], blocked:[[0,1],[2,1],[3,1]], supply:{corner:1, v2:1, p1:1} },
  { n:3, w:5, h:4, teach:"A shattered greenhouse pane. Every hole sealed, nothing hangs off the frame.",
    leaks:[[1,1],[2,1],[3,1],[2,2],[2,3]], blocked:[[0,0],[4,0],[0,3],[4,3]], supply:{h3:1, v2:1, p1:2} },
  { n:4, w:5, h:5, teach:"The commons roof. Not pretty — tight.",
    leaks:[[1,1],[2,1],[3,1],[1,2],[2,2],[3,2],[1,3],[2,3],[3,3],[1,4]], blocked:[[4,1],[4,4]], supply:{sq:1, v3:1, h3:1} },
  { n:5, w:6, h:4, teach:"The old pipes. Long runs, awkward gaps, rust in the way.",
    leaks:[[0,1],[1,1],[2,1],[3,1],[4,1],[5,1],[2,2],[3,2],[2,3],[3,3],[1,2]], blocked:[[1,0],[5,3]], supply:{h3:2, sq:1, p1:1} },
  { n:6, w:6, h:5, teach:"The worst draft in the sickbed. Every scrap of patch, no gaps left.",
    leaks:[[1,1],[2,1],[4,1],[1,2],[2,2],[3,2],[4,2],[1,3],[2,3],[4,3]], blocked:[[3,1],[3,3]], supply:{sq:2, h2:2, v2:1, corner:1} }
];
function patchCheck(L, placed){
  const map={}, used={};
  placed.forEach(p=>{
    used[p.shape]=(used[p.shape]||0)+1;
    PATCH_SHAPES[p.shape].pts.forEach(pt=>{
      const k=cKey(p.x+pt[0], p.y+pt[1]);
      (map[k]=map[k]||[]).push(p.uid);
    });
  });
  const overlaps=[], onBlocked=[];
  for(const [k,uids] of Object.entries(map)){
    const [x,y]=k.split(",").map(Number);
    if(uids.length>1) overlaps.push(k);
    if(L.blocked.some(b=>b[0]===x&&b[1]===y)) onBlocked.push(k);
  }
  const leaksUncovered=L.leaks.filter(l=>{ const k=cKey(l[0],l[1]); return !map[k]||map[k].length===0; });
  const solved = overlaps.length===0 && onBlocked.length===0 && leaksUncovered.length===0 &&
                 Object.keys(used).every(k=>used[k]<=(L.supply[k]||0));
  return {map, used, overlaps, onBlocked, leaksUncovered, solved};
}

/* ============================================================
   FOCUS — heliostat calibration
   Laser-reflection routing. Toggle mirrors between / and \ to bounce a beam
   of light from the source to the collector around ruined struts, inside a
   hard mirror budget. A path-tracing puzzle — closest in feel to circuit
   salvage, but the beam bounces instead of branching, and every cell only
   ever holds one piece of state.
   ============================================================ */
const FOCUS_LEVELS = [
  { n:1, w:4, h:4, teach:"The old heliostat field. Bounce the light from the sun tracker (☀) to the boiler (▣).",
    src:{x:0,y:3,dir:"E"}, target:{x:3,y:0}, blocked:[], budget:2 },
  { n:2, w:5, h:4, teach:"Tap a mirror to cycle it. Routing around a block costs more glass than routing along open ground.",
    src:{x:0,y:2,dir:"E"}, target:{x:4,y:2}, blocked:[[2,2]], budget:3 },
  { n:3, w:5, h:5, teach:"Work around the ruined struts. The light has to pass clear.",
    src:{x:1,y:4,dir:"N"}, target:{x:3,y:4}, blocked:[[1,2],[3,2],[2,1]], budget:3 },
  { n:4, w:6, h:5, teach:"A longer throw. Light loses nothing over distance, but glass is short.",
    src:{x:0,y:0,dir:"S"}, target:{x:5,y:0}, blocked:[[2,3],[3,3],[2,2],[3,2]], budget:4 },
  { n:5, w:6, h:6, teach:"The final array. Two clean bends, if you find the right corner.",
    src:{x:0,y:1,dir:"E"}, target:{x:5,y:4}, blocked:[[4,1],[1,3],[0,4],[4,3]], budget:3 }
];
function focusCheck(L, placed){
  let x=L.src.x, y=L.src.y, dir=L.src.dir, hitTarget=false, loop=0;
  const pts=[[x,y]];
  while(loop++<200){
    if(dir==="E") x++; else if(dir==="W") x--; else if(dir==="S") y++; else if(dir==="N") y--;
    if(x<0||x>=L.w||y<0||y>=L.h) break;
    pts.push([x,y]);
    if(L.blocked.some(b=>b[0]===x&&b[1]===y)) break;
    if(x===L.target.x && y===L.target.y){ hitTarget=true; break; }
    const m=placed[cKey(x,y)];
    if(m==="/"){
      dir = dir==="E"?"N" : dir==="W"?"S" : dir==="N"?"E" : "W";
    } else if(m==="\\"){
      dir = dir==="E"?"S" : dir==="W"?"N" : dir==="N"?"W" : "E";
    }
  }
  const used=Object.keys(placed).length;
  const solved = hitTarget && used<=L.budget;
  return {pts, used, hitTarget, solved};
}

/* Apply circled visuals to a fresh state. */
function applyFounding(s, visualIds){
  s.founding={visuals:visualIds.slice()};
  s.waterCap=80; s.f={};
  const f=s.f;
  for(const id of visualIds){
    const v=VISUALS.find(x=>x.id===id); if(!v) continue;
    const fx=v.fx;
    if(fx.siteRename){ s.siteNames=s.siteNames||{}; s.siteNames[fx.siteRename[0]]=fx.siteRename[1]; }
    if(fx.siteBonus){ const st=s.sites[fx.siteBonus[0]]; for(const[k,val]of Object.entries(fx.siteBonus[1])){st.stock[k]=(st.stock[k]||0)+val; st.total0+=val;} }
    if(fx.sysStart){ s.sys[fx.sysStart[0]].cond=clamp(s.sys[fx.sysStart[0]].cond+fx.sysStart[1],0,100); }
    if(fx.solarStart){
      // one panel already up and wired, same as the systems that start built
      s.sys.solar.built=true;
      s.sys.solar.cond=70+Math.floor(Math.random()*18);
      s.solarPanels=1;
      s.discovered=s.discovered||{}; s.discovered.solar=true;
    }
    if(fx.waterStart) s.res.water+=fx.waterStart;
    if(fx.foodStart) s.res.food=clamp(s.res.food+fx.foodStart,0,60);
    if(fx.scrapStart) s.res.scrap+=fx.scrapStart;
    if(fx.seedsStart) s.res.seeds+=fx.seedsStart;
    if(fx.forestStart){
      // an old orchard: start with a small food forest, some of it already
      // grown apple trees from the parking-lot rows (backdated so they bear soon)
      s.forest = s.forest || [];
      s.crops = s.crops || {};
      s.crops.apple = true;
      const apples = fx.orchardApples || 0;
      for(let i=0;i<fx.forestStart;i++){
        if(i<apples){
          s.forest.push({crop:"apple", growth:0, days:0, ready:false, stored:0, fertility:75,
                         plantedDay: -(SEASON_LEN*4*2)});   // ~2 years already grown
        } else {
          s.forest.push({crop:null, growth:0, days:0, ready:false, stored:0, fertility:75, plantedDay:0});
        }
      }
    }
    if(fx.cropUnlock){
      // a seed store: start already knowing a few more crops (annuals, not the
      // slow perennials -- those you still have to find or plant into the forest)
      s.crops = s.crops || {};
      const annuals = Object.keys(CROPS).filter(id=>CROPS[id].locked && !CROPS[id].perennial);
      for(let i=0;i<fx.cropUnlock && annuals.length;i++){
        const pick = annuals.splice(Math.floor(Math.random()*annuals.length),1)[0];
        s.crops[pick]=true;
      }
    }
    if(fx.coldStart) s.flags.coldFrames=true;
    // accumulating sim modifiers
    if(fx.drawReduce)   f.drawReduce=(f.drawReduce||0)+fx.drawReduce;
    if(fx.safeReturn)   f.safeReturn=true;
    if(fx.strangerRate) f.strangerRate=(f.strangerRate||1)*fx.strangerRate;
    if(fx.carry)        f.carry=(f.carry||0)+fx.carry;
    if(fx.siteYield){ f.siteYield=f.siteYield||{}; for(const[k,val]of Object.entries(fx.siteYield)) f.siteYield[k]=(f.siteYield[k]||1)*val; }
    if(fx.farSafe)      f.farSafe=fx.farSafe;
    if(fx.scrapTrickle) f.scrapTrickle=(f.scrapTrickle||0)+fx.scrapTrickle;
    if(fx.fastLong)     f.fastLong=true;
    if(fx.bikeDull)     f.bikeDull=true;
    if(fx.partsUpkeep)  f.partsUpkeep=(f.partsUpkeep||0)+fx.partsUpkeep;
    if(fx.wetter)       f.wetter=true;
    if(fx.drier)        f.drier=true;
    if(fx.floodRisk)    f.floodRisk=(f.floodRisk||0)+fx.floodRisk;
    if(fx.projectFaster)f.projectFaster=true;
    if(fx.upkeepScrap)  f.upkeepScrap=(f.upkeepScrap||0)+fx.upkeepScrap;
    if(fx.stormBreak)   f.stormBreak=true;
    if(fx.gardenBonus)  f.gardenBonus=(f.gardenBonus||1)*fx.gardenBonus;
    if(fx.nibble)       f.nibble=(f.nibble||0)+fx.nibble;

  const ids = (founderIds && founderIds.length===FOUNDER_COUNT) ? founderIds

  for(let i=unchosen.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [unchosen[i],unchosen[j]]=[unchosen[j],unchosen[i]]; }

function migrate(s){

      const def=all.find(d=>d.id===p.id);

  if(!s.waterCap) s.waterCap=80;
  if(!s.f) s.f={};
  if(!s.puz) s.puz={circuit:0, water:0, seed:0, radio:0};
  if(s.puz.seed===undefined) s.puz.seed=0;
  if(s.puz.radio===undefined) s.puz.radio=0;
  if(s.puz.patch===undefined) s.puz.patch=0;
  if(s.puz.focus===undefined) s.puz.focus=0;
  if(!s.crops) s.crops={};
  if(s.hungerDays===undefined) s.hungerDays=0;
  if(s.thirstDays===undefined) s.thirstDays=0;
  if(!s.dietLog) s.dietLog=[];
  for(const b of s.beds||[]){ if(b.fertility===undefined) b.fertility=75; if(b.plantedDay===undefined) b.plantedDay=0; }
  if(s.turbines===undefined) s.turbines = 1;

  // full 5 panels rather than dropping a built player back to a fifth of their power

  if(s.batteries===undefined) s.batteries = (s.sys && s.sys.battery && s.sys.battery.built) ? MAX_BATTERIES : 1;
  if(!s.forest) s.forest=[];
  if(!s.discovered) s.discovered={};
  if(s.res.rawSeed===undefined) s.res.rawSeed=0;
  if(s.oil===undefined) s.oil=0;
  if(s.reputation===undefined) s.reputation=0.55;
  if(s.neighborStanding===undefined) s.neighborStanding=0;
  if(s.forecast===undefined) s.forecast=null;
  if(s.festivalCooldown===undefined) s.festivalCooldown=0;
  if(s.festivalBoostDays===undefined) s.festivalBoostDays=0;

const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
const mult=c=> c>=40 ? 0.6+0.4*(c-40)/60 : (c/40)*0.6;

   Only "down" (hurt or ill) and "away" take a person out of the village's hands.
   This matters: without it, a famine can never end, because ending it takes work. */
const working=id=>S.people.filter(p=>p.job===id && (p.status==="ok"||p.status==="spent") && canWork(p));

/* ================= practice: earned skill, not endless growth =================
   Two small, capped bonuses on top of a person's fixed hands/green/care/wild.
   SPECIFIC practice is tied to one exact job — turbine repair, cooking, foraging
   the near country — and caps at +0.7. BROAD practice is tied to the wider
   category that job belongs to (any hands-job, any green-job...) and caps at
   +0.3. They stack, so a lifelong specialist tops out +1.0 on that stat; someone
   who rotates jobs within a category without specializing tops out +0.3.
   Both grow on days the matching job is actually worked, and both decay — slowly
   — on days it isn't, so an unused skill fades but never resets to zero.
   None of this is inherited by children (see the birth code): each person earns
   their own. It also never shows in the dot display — the dots are a person's
   fixed nature; practice is silent texture read only by the day's math and by
   the one flavour line under their name (see practiceLine()).

   JOB_PRACTICE maps a static job id to {specific, broad}. Two jobs resolve
   dynamically instead (their specific target changes over time) and are
   handled in buildWorkSnapshot(): "project" (specific = the SYS being raised,
   or none for a one-off PROJECTS build) and "fab" (specific = the FABS id
   under construction). Expedition types (forage/explore/salvage) feed "wild"
   and are credited separately, from S.expeditions, since travelling people
   carry job:"away" rather than a job id. */
const PRACTICE_SPECIFIC_CAP = 0.7;
const PRACTICE_BROAD_CAP = 0.3;
const PRACTICE_SPECIFIC_GROWTH = 0.012;   // per day worked -> ~94% of cap by ~2 game-years
const PRACTICE_BROAD_GROWTH = 0.005;      // per day worked (any job in the category)
const PRACTICE_SPECIFIC_DECAY = 0.0023;   // per day NOT worked -> ~300-day half-life
const PRACTICE_BROAD_DECAY = 0.00115;     // per day NOT worked -> ~600-day half-life (slower: general handiness is stickier than one task)

const JOB_PRACTICE = {
  turbine:{specific:"turbine", broad:"hands"}, solar:{specific:"solar", broad:"hands"},
  battery:{specific:"battery", broad:"hands"}, catchment:{specific:"catchment", broad:"hands"},
  aquaponics:{specific:"aquaponics", broad:"hands"}, irrigation:{specific:"irrigation", broad:"hands"},
  commons:{specific:"commons", broad:"hands"},
  garden:{specific:"garden", broad:"green"}, aquatend:{specific:"aquatend", broad:"green"},
  cook:{specific:"cook", broad:"care"}, care:{specific:"care", broad:"care"}, preserve:{specific:"preserve", broad:"care"}, press:{specific:"press", broad:"hands"}
};

const growPractice = (level, cap, rate) => level + (cap - level) * rate;
const decayPractice = (level, rate) => Math.max(0, level * (1 - rate));

// A person's practice object, tolerant of saves/objects that predate this feature.
const practiceOf = p => p.practice || (p.practice = {specific:{}, broad:{hands:0,green:0,care:0,wild:0}});

// The earned bonus on top of a base stat, for one calculation. `specificKey` is
// whatever the surrounding code is actually crediting right now (a SYS id, a
// FABS id, "garden", "cook", an expedition type...) — pass null if there is none.
function skillBonus(p, statKey, specificKey){
  const pr = practiceOf(p);
  const spec = specificKey!=null ? (pr.specific[specificKey]||0) : 0;
  const broad = pr.broad ? (pr.broad[statKey]||0) : 0;
  return spec + broad;
}
// Base stat + earned practice, for use anywhere a formula currently reads p.hands
// / p.green / p.care / p.wild directly. This is the ONLY place practice should
// touch a number — the dot display always shows the raw base stat.
const effStat = (p, statKey, specificKey) => p[statKey] + skillBonus(p, statKey, specificKey);
const pick=a=>a[Math.floor(Math.random()*a.length)];
const byId=id=>S.people.find(p=>p.id===id);
// Names a specific founding-cast villager for flavor text, but only if they're
// still in the village (alive, not departed) — otherwise falls back to a vague
// stand-in so the journal never has the dead or gone doing things on-page.
// `alive` also requires status !== "away": someone out on the road shouldn't
// be narrated puttering around the commons the same day.
function aliveName(id, fallback){
  const p=byId(id);
  return (p && p.status!=="away") ? p.name : (fallback||"someone");
}
function aliveHe(id, fallback){

  return (p && p.status!=="away") ? subj(p) : (fallback||"someone");
}
// For flavor lines crediting a puzzle solve to "whoever's good at this" rather
// than a name hardcoded to the founding cast — picks the present villager with
// the highest relevant stat, so the line still makes sense generations later.
function bestPresent(statKey){
  const cands=S.people.filter(p=>canWork(p) && p.status!=="away");
  if(!cands.length) return null;

/* Pronouns: possessive form, and subject + correct verb agreement.

const POSS={"she/her":"her","he/him":"his","they/them":"their","she/they":"her","he/they":"his","xe/xem":"xyr"};
const poss=p=>POSS[p.pn]||"their";
const subj=p=>p.pn.split("/")[0];

function tripDays(days,isExplore){
  const f=S.f||{};

// Deterministic fallback so a child is never lost to name exhaustion, even in a very old,
// very lucky village that outlasts the pool above.
function generateFallbackChildName(used){
  const syllA = ["Bri","Fen","Wil","Tam","Sor","Ash","Ren","Cal","Mer","Or"];
  const syllB = ["ar","el","wyn","on","is","eth","ora","in","ley","an"];
  for(let tries=0; tries<40; tries++){
    const name = pick(syllA) + pick(syllB);
    if(!used.has(name)) return name;
  }
  // last resort: guaranteed unique, still legible as a name
  let n = 2, name;
  do { name = "Fen"+n; n++; } while(used.has(name));
  return name;
}

const canRoad = p => p.age>=ADULT && p.age<ELDER && !(p.perm==="leg");

const SEASONS = [
  {id:"spring", name:"Spring", wx:[0.38,0.28,0.34],
   solar:0.9,  heat:0,    grow:1.15, forage:0.9,  roadDays:1,

const seasonIdx = day => Math.floor((day-1)/SEASON_LEN) % 4;

// crop discovery: most crops start locked and are found over time -- through
// expeditions that turn up seed or rootstock, or the seed-frame puzzles. Radish
// and greens are the only two a village starts knowing.
function lockedCrops(){
  return Object.keys(CROPS).filter(id => CROPS[id].locked && !(S.crops && S.crops[id]));
}
// unlock a random still-locked crop (optionally filtered), returning its id or null
function discoverRandomCrop(filter){
  let pool = lockedCrops();
  if(filter) pool = pool.filter(filter);
  if(!pool.length) return null;
  const id = pool[Math.floor(Math.random()*pool.length)];
  S.crops = S.crops || {};
  S.crops[id] = true;
  return id;
}
function discoveryLine(id, how){
  const c=CROPS[id]; if(!c) return "";
  const name=c.name.toLowerCase();
  const seedWord = c.perennial ? "cuttings" : "seed";
  const where = how==="explore" ? "the far country"
              : how==="forage" ? "the near country"
              : "a stripped building";
  return `They brought ${seedWord} back from ${where} — ${name}, a crop the village hasn't grown before. Something new to put in the ground.`;
}
const FORAGE_FLAVOR = {
  spring:"Fiddleheads, ramps, nettle tops, the first dandelion greens. Spring foraging is thin but bright — the woods are barely awake.",
  summer:"Berries, chanterelles, purslane, lambsquarters, green walnuts. High summer gives the most, if you know where to look.",
  autumn:"Acorns, hickory nuts, hen-of-the-woods, rose hips, the last apples gone wild. Autumn is the year's real harvest from the near country.",
  winter:"Bark, rose hips frozen sweet, cattail root, whatever the squirrels cached and forgot. Winter foraging is hungry work for little return."
};
const season    = () => SEASONS[seasonIdx(S.day)];
const yearOf    = day => 1 + Math.floor((day-1)/(SEASON_LEN*4));
const dayOfSeason = day => ((day-1) % SEASON_LEN) + 1;
const isWinter  = () => season().id==="winter";
// the SEASONS table's note is written for the common case (no cold frames);
// this corrects it wherever it's actually shown, so it never contradicts the
// crop list right below it (which already lets hardy/cold-framed crops grow)
const seasonNote = s => (s.id==="winter" && S.flags && S.flags.coldFrames)
  ? "Frozen outside, but the cold frames keep a few beds going all winter — slow, but alive."
  : s.note;

function rollWeather(){
  const f=S.f||{};
  const sn=season();
  let p=[...sn.wx];                                  // clear / overcast / rain, by season
  if(f.wetter){ p=[p[0]-0.08,p[1],p[2]+0.08]; }
  else if(f.drier){ p=[p[0]+0.12,p[1]-0.04,p[2]-0.08]; }
  p=p.map(v=>Math.max(0.02,v));
  const tot=p.reduce((a,b)=>a+b,0);
  let ws=WEATHERS.map((w,i)=>({...w, p:p[i]/tot,
    solar: w.solar*sn.solar}));
  const r=Math.random(); let acc=0;
  for(const w of ws){ acc+=w.p; if(r<=acc) return w; }
  return ws[0];
}
// Turns a bare weather id (as stashed in S.forecast) back into the same scaled
// shape rollWeather() returns, using whatever season is current when it resolves.
function scaledWeather(id){
  const w=WEATHERS.find(x=>x.id===id) || WEATHERS[0];
  return {...w, solar: w.solar*season().solar};
}
// Kav's weather log, made real: once someone is actually keeping it — Kav
// themself, or any Cautious villager (the trait note says "trusts the sky
// less each year"), or a village old enough to have learned the patterns —
// tomorrow's weather shows in the header. Query-only; doesn't touch state.
function forecastUnlocked(){
  const kav=byId("kav");
  if(kav && kav.status!=="away") return true;
  if(S.people.some(p=>p.trait==="Cautious" && p.status!=="away" && canWork(p))) return true;
  if(S.day>=200) return true;
  return false;
}

/* ================= expeditions ================= */
function tickExpeditions(lines){
  const done=[];
  // drop anyone who left the roster mid-trip (a death or departure elsewhere); if
  // that empties a party, retire the whole expedition so nothing dangles behind it.
  for(const ex of S.expeditions){ ex.party = ex.party.filter(pid=>byId(pid)); }
  S.expeditions = S.expeditions.filter(ex=>ex.party.length>0);
  for(const ex of S.expeditions){
    for(const pid of ex.party){
      if(ex.injured.includes(pid)) continue;
      const p=byId(pid);
      if(!p) continue;
      const f=S.f||{};
      let risk=INJURY_PER_DAY*(1-0.12*(effStat(p,"wild",ex.type)-1))*(p.trait==="Cautious"?0.4:1)*(ex.riskMult||1)*(ex.party.length===1?1.5:1);
      if(ex.type==="forage") risk*=0.35;              // near country, known ground
      if(f.farSafe && ex.total>=4) risk*=f.farSafe;   // the rail corridor: graded, cleared, unlosable
      if(f.safeReturn) risk*=0.85;                    // the tower: nobody gets turned around
      risk=Math.max(0.006,risk);
      if(Math.random()<risk) ex.injured.push(pid);
    }
    for(const pid of ex.party){
      const p=byId(pid);
      p.wb=clamp(p.wb + (p.trait==="Restless"?1.5:p.trait==="Steady"?0:-1), wbFloor(p), 100);
    }
    ex.daysLeft--;
    if(ex.daysLeft<=0) done.push(ex);
  }
  for(const ex of done){
    S.expeditions=S.expeditions.filter(x=>x!==ex);
    if(ex.type==="forage"){
      // yield scales with wild skill and with how much the near country has left to give
      const sf=season().forage;
      const raw=ex.party.reduce((a,pid)=>a+3+effStat(byId(pid),"wild","forage")*1.4,0)*sf;
      const got=raw*(S.larder??1);
      S.res.food=clamp(S.res.food+got,0,foodCap());
      S.larder=clamp((S.larder??1) - got/95, 0.12, 1);
      const names=ex.party.map(pid=>byId(pid).name).join(", ");
      const thin=(S.larder??1)<0.45;
      if(season().id==="winter") lines.push("Winter foraging. Bark, rosehips, and whatever the squirrels missed.");
      S.lastForageDay = S.day;
      lines.push(`${names} came back from the near country with ${got.toFixed(0)} food.${thin?" The good patches are thinning. What's left needs a season to come back.":""}`);
      if(lockedCrops().length && Math.random()<0.12){
        // near-country finds lean toward things that grow wild: perennials first if any remain
        const id = discoverRandomCrop(c=>CROPS[c].perennial) || discoverRandomCrop();
        if(id) lines.push(discoveryLine(id,"forage"));
      }
    } else if(ex.type==="explore"){
      const next=SITE_DEF.find(s=>!S.sites[s.id].discovered);
      if(next){
        S.sites[next.id].discovered=true;
        lines.push(`The ranging party came back with a place: ${next.name}, ${next.days} days' round walk. ${next.blurb}`);
      } else if(lockedCrops().length && Math.random()<0.5){
        const id=discoverRandomCrop();
        if(id) lines.push("The ranging party found no new ground, but they came back with something better. "+discoveryLine(id,"explore"));
        else lines.push("The ranging party came back with nothing new. The maps may simply be full now.");
      } else {
        lines.push("The ranging party came back with nothing new. The maps may simply be full now.");
      }
      // even when they DO find a place, a chance of turning up seed too
      if(next && lockedCrops().length && Math.random()<0.3){
        const id=discoverRandomCrop();
        if(id) lines.push(discoveryLine(id,"explore"));
      }
    } else {
      const st=S.sites[ex.siteId], def=siteDef(ex.siteId);
      const carry=ex.party.reduce((a,pid)=>a+4+effStat(byId(pid),"wild",ex.type)+((S.f||{}).carry||0),0);
      let wants={}, wantTotal=0;
      for(const [k,v] of Object.entries(st.stock)){ const t=Math.min(v, v*0.4+1); wants[k]=t; wantTotal+=t; }
      const scale=wantTotal>0?Math.min(1, carry/wantTotal):0;
      const gotWords=[];
      for(const [k,v] of Object.entries(wants)){
        const yf=((S.f||{}).siteYield||{})[ex.siteId]||1;
        const take=Math.min(st.stock[k], Math.round(v*scale*yf*10)/10);
        if(take>0.05){
          st.stock[k]=Math.max(0,st.stock[k]-take);
          if(k==="cans"){
            // found already sealed -- no processing loss, and it never spoils,
            // same as anything else in S.preserved
            S.preserved = clamp(S.preserved+take, 0, S.flags.rootCellar?300:170);
            gotWords.push(`${take.toFixed(0)} cans of kept food`);
          } else {
            const actual = addRes(k, take);
            if(actual>0.05) gotWords.push(`${actual.toFixed(0)} ${k}`);
            else gotWords.push(`no room for more ${k} — the depot's full`);
          }
        }
      }
      const remain=Object.values(st.stock).reduce((a,b)=>a+b,0);
      if(remain<2){ st.depleted=true; for(const k in st.stock) st.stock[k]=0; }
      const names=ex.party.map(pid=>byId(pid).name).join(", ");
      lines.push(`${names} came back from ${siteName(ex.siteId)}${gotWords.length?` with ${gotWords.join(", ")}`:" empty-handed"}.${st.depleted?` There is nothing left there. ${siteName(ex.siteId)} is stripped.`:""}`);
      S.discovered = S.discovered || {};
      if(ex.siteId==="solarfarm" && !S.discovered.solar){
        S.discovered.solar = true;
        lines.push("The wiring diagrams on the wall were still legible. Panels are something the village can build now.");
      }
      if((ex.siteId==="pharmacy"||ex.siteId==="hospital") && !S.discovered.herbalStores){
        S.discovered.herbalStores = true;
        lines.push("Someone came back with more than supplies — a working knowledge of what to dry, and how, and for what.");
      }
      if(lockedCrops().length && Math.random()<0.16){
        const id=discoverRandomCrop();
        if(id) lines.push(discoveryLine(id,"salvage"));
      }
    }
    for(const pid of ex.party){
      const p=byId(pid);
      const name=ex.type==="explore"?"the far country":ex.type==="forage"?"the near country":siteName(ex.siteId);
      if(ex.injured.includes(pid)){
        p.status="down"; p.downDays=(ex.party.length>1?2:4)+Math.floor(Math.random()*2); p.job=null;
        p.wb=clamp(p.wb-15, wbFloor(p), 100);
        // rarely, a hurt does not fully mend. When it doesn't, the lasting memory
        // is the one worth keeping — set it last so nothing overwrites it.
        if(!p.perm && Math.random()<0.12){
          p.perm="leg";
          p.wild=Math.max(1,p.wild-2);
          lines.push(`${p.name}'s leg set badly. ${Cap(subj(p))} will walk, but not the long roads. There is other work, and ${subj(p)} ${isAre(p)} good at it.`);
          p.mem=`Hurt at ${name}, day ${S.day}. The leg never came right.`;
        } else {
          p.mem=`Hurt at ${name}, day ${S.day}.`;
        }
        lines.push(`${p.name} came back hurt. Nothing that won't mend, but ${subj(p)} ${isAre(p)} laid up.`);
      } else {
        p.status="ok"; p.job=null;
        p.mem=`Last out: ${name}, day ${S.day}.`;
      }
    }
  }
}

/* ================= events ================= */
/* Events are stored in state as {defId, ctx} — PLAIN DATA ONLY.
   Functions do not survive the JSON round-trip through storage; an event
   that sits unanswered across a reload must still know how to resolve.
   roll() -> ctx at spawn time (any randomness happens once, here).
   view(ctx) -> {title,text,opts:[{label,sub,can?}]} for rendering.
   resolve(ctx,i) -> applies option i. */
const EVENTS = [
  {
    id:"stranger",
    when:()=>S.newcomerIdx<S.arrivalQueue.length && !S.people.some(p=>p.id===S.arrivalQueue[S.newcomerIdx].id),
    roll:()=>({}),
    view:()=>{
      const n=S.arrivalQueue[S.newcomerIdx];
      const text = n.founderEcho
        ? `${n.name} (${n.pn}) came up the road at dusk with a pack and a careful face — someone who could have been standing in this yard from the very first day, if things had gone a little differently. ${n.note} They ask for nothing outright. They wait.`
        : `${n.name} (${n.pn}) came up the road at dusk with a pack and a careful face. ${n.note} They ask for nothing outright. They wait.`;
      return {
        title: n.founderEcho ? "Someone who might have been here" : "Someone on the road",
        text,
        opts:[
          {label:"Take them in", sub:"another mouth from tonight; another pair of hands soon"},
          {label:"Turn them away", sub:"the stores are the stores"}
        ]
      };
    },
    resolve:(ctx,i)=>{
      const n=S.arrivalQueue[S.newcomerIdx];
      if(i===0){
        const p=freshPerson(n); p.wb=55; p.mem=n.founderEcho?`Arrived day ${S.day}. Could have been here from the first day.`:`Arrived day ${S.day}.`;
        S.people.push(p); S.newcomerIdx++;
        S.pending.push(`${n.name} stayed. A place was made at the long table, the way places are made — someone moved over.`);
      } else {
        S.newcomerIdx++;
        S.people.forEach(p=>{ if(p.status!=="away") p.wb=clamp(p.wb-1,wbFloor(p),100); });

      }
    }
  },
  {
    id:"strangerProc",
    when:()=>S.flags.radioContact && S.newcomerIdx>=S.arrivalQueue.length,

    view:ctx=>({
      title:"Someone on the road, again",
      text:`${ctx.name} (${ctx.pn}) came up the road with a pack and a careful face. ${ctx.note} They ask for nothing outright. They wait.`,
