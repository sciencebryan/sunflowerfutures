function seasonBanner(){
  const s=season();
  const left=SEASON_LEN-dayOfSeason(S.day)+1;
  const winterSoon = s.id==="autumn" && left<=12;
  return `<div class="banner" style="${winterSoon?'border-color:var(--rust)':''}">
    <b>${s.name}, day ${dayOfSeason(S.day)} of ${SEASON_LEN}</b> — ${seasonNote(s)}
    ${s.id==="winter"?` Stores would feed the village ${(S.winterDays||0).toFixed(0)} more days.`:""}
    ${winterSoon?` <span style="color:var(--rust)">Frost in ${left} day${left===1?"":"s"}. Anything tender in open ground will be lost${S.flags.coldFrames?", though the cold frames will keep going":""}, and the open beds won't grow again until the thaw.</span>`:""}
  </div>`;
}

// Spends banked surplus on purpose: an immediate spirits bump for everyone
// present, plus a few days of afterglow (folded into the daily aura calc —
// see S.festivalBoostDays in simulateDay). The only deliberate sink for a
// good year's food; without one, surplus just sits until it spoils.
function holdFestival(){
  const FEST_COST=30, FEST_COOLDOWN=40, FEST_MARGIN=20;
  const stores=S.res.food+S.preserved;
  if((S.festivalCooldown||0)>0) return;
  if(stores < FEST_COST+FEST_MARGIN) return;
  // spend fresh first, then preserved, same order the famine logic already uses
  let need=FEST_COST;
  const fromFresh=Math.min(S.res.food, need); S.res.food-=fromFresh; need-=fromFresh;
  const fromPreserved=Math.min(S.preserved, need); S.preserved-=fromPreserved;
  const usedOil = (S.oil||0)>=3;
  if(usedOil) S.oil -= 3;

  S.festivalBoostDays = 3;
  S.festivalCooldown = FEST_COOLDOWN;
  for(const p of S.people){ if(p.status!=="away") p.wb=clamp(p.wb+10, wbFloor(p), 100); }

  // flavor draws on the real diet log, so a festival after a varied harvest
  // reads differently than one thrown from the last of the jars
  const recentKinds = new Set(S.dietLog.filter(e=>S.day-e.day<=21).map(e=>e.crop));
  const richTable = recentKinds.size>=3;
  const lines = usedOil
    ? [`A festival, and everything on the table fried bright in oil for once — ${richTable?"half of it grown this year":"whatever the stores could spare"}. Nobody kept count of the servings.`,
       "Someone got the whole commons singing before the plates were even cleared."]
    : [`A festival on nothing but what was banked, and it was enough. ${richTable?"A season's worth of different things, all out at once.":"Plain food, plenty of it, and no one rationing tonight."}`,
       "Whatever the day's work was, it waited."];
  S.pending.push(pick(lines));
  S.journal.unshift({day:S.day, weather:S.weather, event:true,
    lines:[`A festival was held.${usedOil?" Oil, spent on purpose, not saved.":""} ${FEST_COST} food given over, on purpose, to a night nobody worked.`,
           "It will happen again, someday, when there's enough to spare again."]});
}

function renderVillage(){
  let h=seasonBanner()+renderEvent()+powerCard();
  for(const def of SYS){
    const st=S.sys[def.id];
    if(!st.built && !isVisible(def)) continue;
    if(!st.built){
      const afford=Object.entries(def.cost).every(([k,v])=>S.res[k]>=v);
      const canStart = afford && !S.project;
      const costHtml=Object.entries(def.cost).map(([k,v])=>`<span class="cost ${S.res[k]>=v?'':'short'}">${v} ${k}</span>`).join("");
      const missing=Object.entries(def.cost).filter(([k,v])=>S.res[k]<v).map(([k,v])=>`${(v-S.res[k]).toFixed(0)} more ${k}`);
      h+=`<div class="card ${canStart?'buildable':''}">
        <div class="card-top"><div class="sysname">${def.name}</div>
          <button class="go ${canStart?'ready':''}" data-build="${def.id}" ${canStart?"":"disabled"}>Build it</button></div>
        <div class="blurb">Not yet built. ${def.blurb}</div>
        <div class="costchips">${costHtml}<span class="cost">~${Math.ceil(def.work/5)} days of work</span>${def.draw>0?`<span class="cost">draws ${def.draw} power</span>`:""}</div>
        ${!afford?`<div class="sysmeta"><span class="outline-note">Need ${missing.join(", ")}.</span></div>`:S.project?`<div class="sysmeta"><span class="outline-note">Finish the current project first.</span></div>`:""}
      </div>`;
      continue;
    }
    const c=st.cond;
    const crew=S.people.filter(p=>p.job===def.id);
    const F=S.flags;
    const dec = decayOf(def);
    const netDay = crew.filter(p=>p.status==="ok").reduce((a,p)=>{
      let hd=effStat(p,"hands",def.id)+(p.trait==="Tinkerer"?1.5:0)+(p.trait==="Cautious"?-0.5:0);
      return a+hd*1.6*eff(p)*(F.toolLibrary?1.2:1)*(S.sys[def.id].cond>=85?0.45:1);},0) - dec;
    let roles=`<div class="rolerow">${roleChip(def.id,"keeper","no one")}`;
    if(def.id==="aquaponics") roles+=roleChip("aquatend","tender","no one");
    if(def.id==="commons") roles+=roleChip("cook","cook","no one");
    roles+=`</div>`;
    let stackExtra="";
    if(STACKABLE[def.id]){
      const meta=STACKABLE[def.id];
      const n=S[meta.stateKey]||1;
      const canRaise = n<meta.max && Object.entries(meta.cost).every(([k,v])=>S.res[k]>=v);
      const costStr = Object.entries(meta.cost).map(([k,v])=>`${v} ${k}`).join(", ");
      stackExtra = `<div class="sysmeta"><span class="outline-note">${n} of ${meta.max} ${meta.noun} ${meta.verb} · one keeper minds them all</span>
        ${n<meta.max?`<button class="go ${canRaise?'ready':''}" data-raise="${def.id}" ${canRaise?"":"disabled"}>Raise another (${costStr})</button>`:`<span class="outline-note">${meta.place} is full</span>`}</div>`;
    }
    h+=`<div class="card">
      <div class="card-top"><div class="sysname">${def.name}${STACKABLE[def.id]&&(S[STACKABLE[def.id].stateKey]||1)>1?` ×${S[STACKABLE[def.id].stateKey]}`:""}</div><div class="condpct">${c.toFixed(0)}%</div></div>
      <div class="blurb">${def.blurb}</div>
      <div class="cbar"><div class="fill ${condClass(c)}" style="width:${c}%"></div></div>
      ${roles}
      ${stackExtra}
      <div class="sysmeta"><span class="outline-note">${netDay>=0?"+":""}${netDay.toFixed(1)}%/day · wears −${dec.toFixed(1)}${def.id==="commons"?" · cook lifts everyone":""}</span></div>
      ${def.id==="aquaponics"&&built("aquaponics")?`<div class="sysmeta"><span class="outline-note">${(S.report.aquaFood||0).toFixed(1)} food/day = ${S.report.aquaWhy||"unattended base"}</span></div>`:""}
      ${c<35?`<div class="warnline">Failing. Output is badly reduced.</div>`:""}
    </div>`;
  }
  {
    const sn=season();
    const tenders=S.people.filter(p=>p.job==="garden");
    const frozen = sn.grow===0 && !S.flags.coldFrames;
    h+=`<div class="card">
      <div class="card-top"><div class="sysname">The gardens</div><div class="condpct">${tenders.length} tending · ${S.beds.length} bed${S.beds.length>1?"s":""}</div></div>
      <div class="blurb">${frozen
        ? "Frozen ground. Nothing sown now would live to see the thaw."
        : "Sow a bed, tend it, wait. A radish is a week; grain is most of a season."}</div>
      <div class="rolerow">${roleChip("garden","tenders","untended")}</div>
      <div class="sysmeta"><span class="outline-note">${(S.report.gardenFood||0)>0?`brought in ${(S.report.gardenFood).toFixed(0)} today · `:""}${S.report.gardenWhy||"nothing planted"}</span></div>
      ${S.flags.compost?`<div class="sysmeta"><span class="outline-note">${(S.compost||0).toFixed(0)} compost turning, spread onto whatever's most worn</span></div>`:""}`;
    S.beds.forEach((bed,i)=>{
      const soilTag = ` <span class="outline-note" style="opacity:.65">· ${SOIL_WORD(bed.fertility??75)}</span>`;
      if(!bed.crop){
        h+=`<div class="sysmeta" style="margin-top:7px"><span class="outline-note">Bed ${i+1} — bare${soilTag}</span>
          <button class="go" data-sow="${i}" ${frozen?"disabled":""}>Sow</button></div>`;
        return;
      }
      const crop=CROPS[bed.crop];
      // every planted bed gets a way in -- this used to only exist for bare beds,
      // which meant "turn it under" was never actually reachable. Now it is.
      if(crop.perennial){
        const ageYears=(S.day-bed.plantedDay)/(SEASON_LEN*4);
        const estFrac=clamp(ageYears/crop.matureYears,0.15,1);
        const status = bed.ready ? "ready to bring in"
                      : estFrac>=1 ? `established · bears in ${crop.harvestSeason}`
                      : `year ${Math.max(1,Math.ceil(ageYears))}/${crop.matureYears} toward bearing`;
        h+=`<div class="sysmeta" style="margin-top:7px"><span class="outline-note">Bed ${i+1} — ${crop.name.toLowerCase()} · ${status}${soilTag}</span>
            <span class="outline-note">${bed.ready?`${bed.stored.toFixed(0)} waiting`:`${(estFrac*100).toFixed(0)}%`}</span>
            <button class="go" data-sow="${i}" style="margin-left:6px">Manage</button></div>
          <div class="cbar" style="margin:3px 0 2px"><div class="fill ${bed.ready?'c-good':'c-sun'}" style="width:${(bed.ready?100:estFrac*100)}%"></div></div>`;
      } else {
        const pc=clamp(bed.growth/crop.work*100,0,100);
        h+=`<div class="sysmeta" style="margin-top:7px"><span class="outline-note">Bed ${i+1} — ${crop.name.toLowerCase()}${bed.ready?" · ready to bring in":""}${soilTag}</span>
            <span class="outline-note">${bed.ready?`${bed.stored.toFixed(0)} waiting`:`${pc.toFixed(0)}%`}</span>
            <button class="go" data-sow="${i}" style="margin-left:6px">Manage</button></div>
          <div class="cbar" style="margin:3px 0 2px"><div class="fill ${bed.ready?'c-good':'c-sun'}" style="width:${pc}%"></div></div>`;
      }
    });
    h+=`</div>`;
  }

  // --- restoration: three ecological metrics, shown once the village begins healing land ---
  if(S.restore && S.restore.seen){
    const r=S.restore;
    const rows=[
      {k:"mycosphere", name:"Soil mycosphere", val:r.mycosphere, note:"the living soil web — fed by native plantings and compost"},
      {k:"aquifer",    name:"Aquifer",         val:r.aquifer,    note:"the water table — fed by watershed work"},
      {k:"pollinator", name:"Pollinator density", val:r.pollinator, note:"the wild bloom — fed by wildflower meadows"}
    ];
    const band = v => v>=RESTORE_HIGH ? "c-good" : v<=RESTORE_LOW ? "c-rust" : "c-sun";
    const state = v => v>=RESTORE_GATE ? "restored" : v>=RESTORE_HIGH ? "holding on its own" : v<=RESTORE_LOW ? "still fragile" : "taking hold";
    let rh=`<div class="card">
      <div class="card-top"><div class="sysname">The valley</div><div class="condpct">${r.restored?"restored":"healing"}</div></div>
      <div class="blurb">The work has turned outward — from keeping the village alive to giving the land back its own health. These hold themselves up once they catch, and slide back if the ground beneath them fails.</div>`;
    for(const row of rows){
      rh+=`<div class="sysmeta" style="margin-top:8px"><span class="outline-note">${row.name} — ${state(row.val)}</span>
        <span class="outline-note">${row.val.toFixed(0)}%</span></div>
        <div class="cbar" style="margin:3px 0 2px"><div class="fill ${band(row.val)}" style="width:${row.val}%"></div></div>
        <div class="sysmeta"><span class="outline-note" style="opacity:.6">${row.note}</span></div>`;
    }
    if(r.restored) rh+=`<div class="sysmeta" style="margin-top:8px"><span class="outline-note" style="color:var(--leaf)">The valley is whole. Human ground and wild ground have stopped being different things.</span></div>`;
    rh+=`</div>`;
    h+=rh;
  }

  // --- the food forest: perennial ground, separate from the kitchen beds ---
  {
    const forest = S.forest||[];
    const knowsPerennial = Object.keys(CROPS).some(id=>CROPS[id].perennial && (!CROPS[id].locked || (S.crops&&S.crops[id])));
    if(forest.length>0 || knowsPerennial){
      const canClear = forest.length<MAX_FOREST_PLOTS && Object.entries(FOREST_PLOT_COST).every(([k,v])=>S.res[k]>=v);
      const clearCost = Object.entries(FOREST_PLOT_COST).map(([k,v])=>`${v} ${k}`).join(", ");
      h+=`<div class="card">
        <div class="card-top"><div class="sysname">The food forest</div><div class="condpct">${forest.length} plot${forest.length!==1?"s":""}</div></div>
        <div class="blurb">The edge ground — old orchard rows, the parking-lot trees. Perennials go here: years to bear, then food for almost nothing.</div>`;
      if(forest.length===0){
        h+=`<div class="sysmeta"><span class="outline-note">No plots cleared yet.</span></div>`;
      }
      forest.forEach((plot,i)=>{
        const soilTag=` <span class="outline-note" style="opacity:.65">· ${SOIL_WORD(plot.fertility??75)}</span>`;
        if(!plot.crop){
          h+=`<div class="sysmeta" style="margin-top:7px"><span class="outline-note">Plot ${i+1} — cleared, empty${soilTag}</span>
            <button class="go" data-forest="${i}">Plant</button></div>`;
        } else if(plot.meadow){
          h+=`<div class="sysmeta" style="margin-top:7px"><span class="outline-note">Plot ${i+1} — wildflower meadow · in bloom for the bees${soilTag}</span>
            <button class="go" data-forest="${i}" style="margin-left:6px">Manage</button></div>`;
        } else {
          const crop=CROPS[plot.crop];
          const ageYears=(S.day-plot.plantedDay)/(SEASON_LEN*4);
          const estFrac=clamp(ageYears/crop.matureYears,0.15,1);
          const status = plot.ready ? "ready to bring in"
                        : estFrac>=1 ? `established · bears in ${crop.harvestSeason}`
                        : `year ${Math.max(1,Math.ceil(ageYears))}/${crop.matureYears} toward bearing`;
          h+=`<div class="sysmeta" style="margin-top:7px"><span class="outline-note">Plot ${i+1} — ${crop.name.toLowerCase()} · ${status}${soilTag}</span>
              <span class="outline-note">${plot.ready?`${plot.stored.toFixed(0)} waiting`:`${(estFrac*100).toFixed(0)}%`}</span>
              <button class="go" data-forest="${i}" style="margin-left:6px">Manage</button></div>
            <div class="cbar" style="margin:3px 0 2px"><div class="fill ${plot.ready?'c-good':'c-sun'}" style="width:${(plot.ready?100:estFrac*100)}%"></div></div>`;
        }
      });
      if(forest.length<MAX_FOREST_PLOTS){
        h+=`<div class="sysmeta" style="margin-top:7px"><span class="outline-note">clearing ground is slow work, but it's done once</span>
          <button class="go ${canClear?'ready':''}" data-clearplot="1" ${canClear?"":"disabled"}>Clear a plot (${clearCost})</button></div>`;
      } else {
        h+=`<div class="sysmeta"><span class="outline-note">the forest is as wide as the edge ground allows</span></div>`;
      }
      h+=`</div>`;
    }
  }

  const down=S.people.filter(p=>p.status==="down"||p.status==="spent");
  h+=`<div class="card">
    <div class="card-top"><div class="sysname">The sickbed</div><div class="condpct">${down.length} laid up</div></div>
    <div class="blurb">Broth, splints, and someone to sit with. The hurt and the spent mend faster with care.</div>
    <div class="rolerow">${roleChip("care","caretaker","no one")}</div>
    <div class="sysmeta"><span class="outline-note">${down.length?down.map(p=>p.name).join(", "):"everyone is on their feet"} · uses care</span></div>
  </div>`;

  // putting food by
  {
    const methods=Object.values(PRESERVE).filter(m=>S.flags[m.flag]);
    h+=`<div class="card">
      <div class="card-top"><div class="sysname">Putting food by</div><div class="condpct">${S.preserved.toFixed(0)} kept</div></div>
      <div class="sysmeta" style="margin-bottom:5px"><span class="outline-note ${(S.winterDays||0)<30?'':''}" style="color:${(S.winterDays||0)<30?'var(--rust)':'var(--leaf)'}">stores would feed the village ${(S.winterDays||0).toFixed(0)} days · winter is 30</span></div>
      <div class="blurb">${methods.length
        ? "Fresh food spoils, and faster in summer. What's dried, fermented or canned keeps until you need it. In winter you will."
        : "Fresh food spoils. Nothing keeps yet — build drying racks, crocks, or canning to get through a winter."}</div>
      ${methods.length?`<div class="rolerow">${roleChip("preserve","hands","nobody putting food by")}</div>
        <div class="sysmeta"><span class="outline-note">${S.report.preserveWhy||methods.map(m=>m.name.toLowerCase()).join(" · ")}</span></div>`:""}
    </div>`;
  }

  // --- pressing oil, once the press is built ---
  if(S.flags.oilPress){
    h+=`<div class="card">
      <div class="card-top"><div class="sysname">Pressing oil</div><div class="condpct">${(S.oil||0).toFixed(1)} oil</div></div>
      <div class="blurb">Sunflower seed set aside from the harvest, turned by hand into something worth cooking with. Slow, and most of the seed doesn't become oil.</div>
      <div class="rolerow">${roleChip("press","hands","nobody at the press")}</div>
      <div class="sysmeta"><span class="outline-note">${(S.res.rawSeed||0).toFixed(1)} seed waiting · ${S.report.pressWhy||"nothing pressed today"}</span></div>
    </div>`;
  }

  // --- a festival: the one deliberate sink for a good year's surplus ---
  {
    const FEST_COST=30, FEST_COOLDOWN=40;
    const stores=S.res.food+S.preserved;
    const canAfford = stores >= FEST_COST + 20;   // never lets a festival eat into winter margin
    const onCooldown = (S.festivalCooldown||0)>0;
    const hasOil = (S.oil||0)>=3;
    const canHold = canAfford && !onCooldown;
    h+=`<div class="card ${canHold?'buildable':''}">
      <div class="card-top"><div class="sysname">Hold a festival</div>
        <button class="go ${canHold?'ready':''}" data-festival="1" ${canHold?"":"disabled"}>Hold it</button></div>
      <div class="blurb">A night the stores can afford, given over on purpose. Everyone eats well, nobody works, and it's the only good reason to spend a surplus instead of banking it against a worse winter.</div>
      <div class="costchips"><span class="cost ${stores>=FEST_COST?'':'short'}">${FEST_COST} food</span>${hasOil?`<span class="cost">3 oil, if you have it — a richer table</span>`:""}<span class="cost">lifts spirits for 3 days</span></div>
      ${onCooldown?`<div class="sysmeta"><span class="outline-note">Too soon again — give it ${S.festivalCooldown} more day${S.festivalCooldown===1?"":"s"}.</span></div>`
        :!canAfford?`<div class="sysmeta"><span class="outline-note">Needs a real surplus — ${FEST_COST} food to spend, and ${20} left over after.</span></div>`:""}
    </div>`;
  }

  h+=`<div class="sectionlbl">Work &amp; projects</div>`;
  h+=salvageChips();
  if(S.project){
    const isBuild=S.project.kind==="build";
    const def=workDef();
    const pc=clamp(S.project.progress/def.work*100,0,100);
    h+=`<div class="card">
      <div class="card-top"><div class="sysname">${isBuild?`Raising the ${def.name.toLowerCase()}`:def.name}</div><div class="condpct">${pc.toFixed(0)}%</div></div>
      <div class="blurb">${def.blurb}</div>
      <div class="cbar"><div class="fill c-sun" style="width:${pc}%"></div></div>
      <div class="rolerow">${roleChip("project","hands","no hands on it")}</div>
    </div>`;
  }
  for(const proj of PROJECTS){
    if(S.flags[proj.id]) continue;
    if(S.project && S.project.id===proj.id) continue;
    if(!isVisible(proj)) continue;
    const afford=Object.entries(proj.cost).every(([k,v])=>S.res[k]>=v);
    const canStart=afford && !S.project;
    const costHtml=Object.entries(proj.cost).map(([k,v])=>`<span class="cost ${S.res[k]>=v?'':'short'}">${v} ${k}</span>`).join("");
    const missing=Object.entries(proj.cost).filter(([k,v])=>S.res[k]<v).map(([k,v])=>`${(v-S.res[k]).toFixed(0)} more ${k}`);
    h+=`<div class="card ${canStart?'buildable':''}">
      <div class="card-top"><div class="sysname">${proj.name}</div>
        <button class="go ${canStart?'ready':''}" data-proj="${proj.id}" ${canStart?"":"disabled"}>Begin</button></div>
      <div class="blurb">${proj.blurb}</div>
      <div class="costchips">${costHtml}<span class="cost">~${Math.ceil(proj.work/5)} days of work</span></div>
      ${!afford?`<div class="sysmeta"><span class="outline-note">Need ${missing.join(", ")}.</span></div>`:S.project?`<div class="sysmeta"><span class="outline-note">Finish the current project first.</span></div>`:""}
    </div>`;
  }
  const doneProj=PROJECTS.filter(p=>S.flags[p.id]);
  if(doneProj.length) h+=`<div class="sectionlbl">Finished: ${doneProj.map(p=>p.name).join(" · ")}</div>`;

  // fabrication
  h+=`<div class="sectionlbl">Fabrication — making what you used to find</div>`;
  if(S.fabProject){
    const def=FABS.find(x=>x.id===S.fabProject.id);
    const pc=clamp(S.fabProject.progress/def.work*100,0,100);
    h+=`<div class="card">
      <div class="card-top"><div class="sysname">${def.name}</div><div class="condpct">${pc.toFixed(0)}%</div></div>
      <div class="blurb">${def.blurb}</div>
      <div class="cbar"><div class="fill c-sun" style="width:${pc}%"></div></div>
      <div class="rolerow">${roleChip("fab","hands","no hands on it")}</div>
    </div>`;
  }
  for(const def of FABS){
    if(S.fabs[def.id]){
      h+=`<div class="card grey"><div class="card-top"><div class="sysname">${def.name}</div>
        <div class="condpct">+${FAB_RATE[def.gives].toFixed(2)} ${def.gives}/day</div></div>
        <div class="blurb">${def.blurb}</div></div>`;
      continue;
    }
    if(S.fabProject && S.fabProject.id===def.id) continue;
    const afford=Object.entries(def.cost).every(([k,v])=>S.res[k]>=v);
    const canStart=afford && !S.fabProject;
    const costHtml=Object.entries(def.cost).map(([k,v])=>`<span class="cost ${S.res[k]>=v?'':'short'}">${v} ${k}</span>`).join("");
    const missing=Object.entries(def.cost).filter(([k,v])=>S.res[k]<v).map(([k,v])=>`${(v-S.res[k]).toFixed(0)} more ${k}`);
    h+=`<div class="card ${canStart?'buildable':''}">
      <div class="card-top"><div class="sysname">${def.name}</div>
        <button class="go ${canStart?'ready':''}" data-fab="${def.id}" ${canStart?"":"disabled"}>Begin</button></div>
      <div class="blurb">${def.blurb}</div>
      <div class="costchips">${costHtml}<span class="cost">then +${FAB_RATE[def.gives].toFixed(2)} ${def.gives}/day, forever</span></div>
      ${!afford?`<div class="sysmeta"><span class="outline-note">Need ${missing.join(", ")}.</span></div>`:S.fabProject?`<div class="sysmeta"><span class="outline-note">Finish the current fabrication first.</span></div>`:""}
    </div>`;
  }

  const resting=S.people.filter(p=>p.job===null&&p.status==="ok").length;
  const away=S.people.filter(p=>p.status==="away").length;
  const laidup=S.people.filter(p=>p.status==="down"||p.status==="spent").length;
  h+=`<div class="sectionlbl">${S.people.length} villagers · ${resting} resting · ${laidup} laid up · ${away} away</div>`;

  $("tab-village").innerHTML=h;
  $("tab-village").querySelectorAll("[data-open]").forEach(el=>{
    el.onclick=()=>openSystemSheet(el.dataset.open);
  });
  $("tab-village").querySelectorAll("[data-sow]").forEach(b=>{
    b.onclick=()=>openSowSheet(+b.dataset.sow);
  });
  $("tab-village").querySelectorAll("[data-fab]").forEach(b=>{
    b.onclick=()=>{
      const def=FABS.find(x=>x.id===b.dataset.fab);
      if(S.fabProject) return;
      if(!Object.entries(def.cost).every(([k,v])=>S.res[k]>=v)) return;
      for(const [k,v] of Object.entries(def.cost)) S.res[k]-=v;
      S.fabProject={id:def.id, progress:0};
      S.pending.push(`Work began on ${def.name.toLowerCase()}.`);
      store.save(S); renderAll();
    };
  });
  $("tab-village").querySelectorAll("[data-proj]").forEach(b=>{
    b.onclick=()=>{
      const proj=PROJECTS.find(p=>p.id===b.dataset.proj);
      for(const [k,v] of Object.entries(proj.cost)) S.res[k]-=v;
      S.project={kind:"project", id:proj.id, progress:0};
      S.pending.push(`Work began on the ${proj.name.toLowerCase()}.`);
      store.save(S); renderAll();
    };
  });
  $("tab-village").querySelectorAll("[data-build]").forEach(b=>{
    b.onclick=()=>{
      const def=SYS.find(s=>s.id===b.dataset.build);
      for(const [k,v] of Object.entries(def.cost)) S.res[k]-=v;
      S.project={kind:"build", id:def.id, progress:0};
      S.pending.push(`They began raising the ${def.name.toLowerCase()}. Someone needs to be on it.`);
      store.save(S); renderAll();
    };
  });
  $("tab-village").querySelectorAll("[data-raise]").forEach(b=>{
    b.onclick=()=>{
      const id=b.dataset.raise;
      const meta=STACKABLE[id];
      if(!meta) return;
      const n=S[meta.stateKey]||1;
      if(n>=meta.max) return;
      if(!Object.entries(meta.cost).every(([k,v])=>S.res[k]>=v)) return;
      for(const [k,v] of Object.entries(meta.cost)) S.res[k]-=v;
      S[meta.stateKey] = n+1;
      // a new unit pulls the array's average condition down a little until it's tuned in
      S.sys[id].cond = clamp(S.sys[id].cond*0.9, 0, 100);
      const msg = id==="turbine" ? `Another turbine went up on the ridge. ${S[meta.stateKey]} of them turning now.`
                : id==="solar"   ? `Another panel went up on the roof. ${S[meta.stateKey]} of them catching light now.`
                : `Another bank got wired in. ${S[meta.stateKey]} of them holding charge now.`;
      S.pending.push(msg);
      store.save(S); renderAll();
    };
  });
  $("tab-village").querySelectorAll("[data-forest]").forEach(b=>{
    b.onclick=()=>openSowSheet(+b.dataset.forest, true);
  });
  $("tab-village").querySelectorAll("[data-clearplot]").forEach(b=>{
    b.onclick=()=>{
      S.forest = S.forest || [];
      if(S.forest.length>=MAX_FOREST_PLOTS) return;
      if(!Object.entries(FOREST_PLOT_COST).every(([k,v])=>S.res[k]>=v)) return;
      for(const [k,v] of Object.entries(FOREST_PLOT_COST)) S.res[k]-=v;
      S.forest.push({crop:null, growth:0, days:0, ready:false, stored:0, fertility:75, plantedDay:0});
      S.pending.push("A new plot cleared at the edge, ready for something that will outlast the season.");
      store.save(S); renderAll();
    };
  });
  $("tab-village").querySelectorAll("[data-festival]").forEach(b=>{
    b.onclick=()=>{ holdFestival(); store.save(S); renderAll(); };
  });
  $("tab-village").querySelectorAll("[data-evopt]").forEach(b=>{
    b.onclick=()=>{
      const def=eventDef(S.event.defId);
      const ev=eventView();
      if(!def||!ev){ S.event=null; renderAll(); return; }
      const i=+b.dataset.evopt, opt=ev.opts[i];
      if(opt.can && !opt.can()) return;
      def.resolve(S.event.ctx, i);
      S.journal.unshift({day:S.day, weather:S.weather, event:true,
        lines:[`${ev.title}. ${ev.text}`, `— The village chose: ${opt.label.toLowerCase()}.`]});
      S.event=null; S.eventCd=6+Math.floor(Math.random()*5);
      store.save(S); renderAll();
    };
  });
}

function skillDots(p){
  const dot=(n)=> "●".repeat(n)+"○".repeat(5-n);
  return `hands ${dot(p.hands)} &nbsp; green ${dot(p.green)}<br>care&nbsp; ${dot(p.care)} &nbsp; wild&nbsp; ${dot(p.wild)}`;
}
// "the wind turbine" / "the forge" / "the gardens" — a readable name for a practice key,
// normalized so a SYS/FABS name that already starts with "The" doesn't double up.
function practiceLabel(key){
  const withThe = name => { let n=name.toLowerCase(); if(n.startsWith("the ")) n=n.slice(4); return "the "+n; };
  const sys=SYS.find(x=>x.id===key); if(sys) return withThe(sys.name);
  const fab=FABS.find(x=>x.id===key); if(fab) return withThe(fab.name);
  const manual={garden:"the gardens", aquatend:"the tanks", cook:"the hearth", care:"the sickbed",
                preserve:"putting food by", forage:"foraging the near country",
                explore:"ranging the far country", salvage:"salvage runs"};
  return manual[key] || key;
}
// A person's strongest earned specific skill, as {key, val} or null if they
// haven't practiced anything enough to notice yet. Shared by practiceLine()
// and the apprenticeship handoff at death, so both agree on what someone
// was "known for."
function bestSpecific(p){
  const pr=practiceOf(p);
  let bestKey=null, bestVal=0;
  for(const [k,v] of Object.entries(pr.specific)){ if(v>bestVal){ bestVal=v; bestKey=k; } }
  return bestKey ? {key:bestKey, val:bestVal} : null;
}
// One quiet line of earned-skill flavour, shown only once it's actually noticeable.
// Reads the practice data but never shows a number — same rule as everywhere else.
function practiceLine(p){
  const best=bestSpecific(p);
  if(!best || best.val < 0.18) return "";
  const label=practiceLabel(best.key);
  const frac=best.val/PRACTICE_SPECIFIC_CAP;
  const knows = subj(p)==="they" ? "know" : "knows";
  if(frac>=0.85) return `${Cap(subj(p))} could tend ${label} in ${poss(p)} sleep.`;
  if(frac>=0.55) return `${Cap(subj(p))} ${knows} ${label} well now.`;
  return `${Cap(subj(p))} ${isAre(p)} getting the feel of ${label}.`;
}

function renderPeople(){
  let h=`<div class="legend"><b>hands</b> — ${SKILL_INFO.hands} · <b>green</b> — ${SKILL_INFO.green}<br><b>care</b> — ${SKILL_INFO.care} · <b>wild</b> — ${SKILL_INFO.wild}</div>`;
  for(const p of S.people){
    let badge="";
    if(!canWork(p)) badge+=`<span class="status-badge" style="color:var(--water);border-color:var(--water)">child, ${p.age}</span>`;
    else if(p.age>=ELDER) badge+=`<span class="status-badge" style="color:var(--sun);border-color:var(--sun)">elder, ${p.age}</span>`;
    if(p.perm==="leg") badge+=`<span class="status-badge" style="color:var(--ink-soft);border-color:var(--ink-soft)">stays home</span>`;
    if(p.status==="down") badge+=`<span class="status-badge">laid up</span>`;
    else if(p.status==="spent") badge+=`<span class="status-badge">spent</span>`;
    else if(p.status==="away") badge+=`<span class="status-badge away">away</span>`;
    let assign;
    if(p.status==="away"){
      const ex=S.expeditions.find(e=>e.party.includes(p.id));
      assign=ex?`Out at <b>${exWhere(ex)}</b> — back in ${ex.daysLeft}d`:"Away";
    } else if(!canWork(p)){ assign=`Underfoot, and learning. ${Cap(subj(p))} will be ${ADULT} soon enough.`; }
    else if(p.status==="down"){ assign="Laid up — not available"; }
    else if(p.status==="spent" && p.job){ assign=`Spent, and still at it — ${assignPhrase(p).replace(/^./,c=>c.toLowerCase())}. Half the work of a rested person.`; }
    else if(p.status==="spent"){ assign="Spent. Resting until spirits return."; }
    else if(p.job){ assign=`${assignPhrase(p)}${p.streak>=3?` · ${p.streak} days straight`:""}`; }
    else assign="Resting";
    h+=`<button class="card pcard" data-p="${p.id}">
      <div><span class="pname">${p.name}<span class="pn">${p.pn}</span></span> <span class="trait">${p.trait}</span>${badge}</div>
      <div class="skills">${skillDots(p)}<br><span style="opacity:.75">${p.age} years old${p.years>0?` · ${p.years} winter${p.years>1?"s":""} here`:""}</span>
      ${practiceLine(p)?`<div style="margin-top:3px;font-style:italic;opacity:.8">${practiceLine(p)}</div>`:""}</div>
      <div class="wbwrap"><div class="wbtrack"><div class="wbfill" style="width:${p.wb}%;background:${wbColor(p.wb)}"></div></div><div class="wbnum">${p.wb.toFixed(0)}</div></div>
      <div class="passign">${assign}</div>
      <div class="flavor">${p.note} <span style="font-style:normal;color:var(--moss)">· ${TRAITS[p.trait]}.</span></div>
      ${p.mem?`<div class="mem">${p.mem}</div>`:""}
    </button>`;
  }
  $("tab-people").innerHTML=h;
  $("tab-people").querySelectorAll("[data-p]").forEach(el=>{
    el.onclick=()=>openPersonSheet(el.dataset.p);
  });
}

function openPuzzle(kind){
  if(kind==="circuit"){
    const L=CIRCUIT_LEVELS[S.puz.circuit];
    pz={kind, L, paths:{}, sel:L.loads[0].name};
  } else if(kind==="water") {
    const L=WATER_LEVELS[S.puz.water];
    pz={kind, L, placed:{}, sel:Object.keys(L.budget)[0], dir:"E"};
  } else if(kind==="seed") {
    const L=SEED_LEVELS[S.puz.seed];
    pz={kind, L, placed:{}, sel:Object.keys(L.supply)[0]};
  } else if(kind==="patch") {
    const L=PATCH_LEVELS[S.puz.patch];
    pz={kind, L, placed:[], sel:Object.keys(L.supply)[0], uid:1};
  } else if(kind==="focus") {
    const L=FOCUS_LEVELS[S.puz.focus];
    pz={kind, L, placed:{}};
  } else {
    const L=SIGNAL_LEVELS[S.puz.radio];
    pz={kind, L, placed:{}};
  }
  renderWorks();
}
function closePuzzle(){ pz=null; renderWorks(); }

function rewardPreview(kind){
  const meta=PUZ_META[kind];
  const n = S.puz[kind];
  const at = meta.reward[n+1];
  if(at) return "Solving this one: "+at.desc+".";
  const next=Object.keys(meta.reward).map(Number).filter(k=>k>n).sort((a,b)=>a-b)[0];
  return next?`Ground gained toward ${meta.noun} ${next}: ${meta.reward[next].desc}.`:"";
}
function grantReward(kind){
  const meta=PUZ_META[kind];
  const n = S.puz[kind];
  const r = meta.reward[n];
  if(!r) return "";
  const bits=[], crops=[];
  for(const [k,v] of Object.entries(r)){
    if(k==="flag"){
      S.flags[v]=true;
      if(v==="terraces") S.beds.push({crop:null,growth:0,days:0,ready:false,stored:0,fertility:75,plantedDay:0});
      continue;
    }
    if(k==="desc") continue;
    if(k==="crop"){ S.crops=S.crops||{}; S.crops[v]=true; crops.push(CROPS[v]?CROPS[v].name.toLowerCase():v); continue; }
    S.res[k]=(S.res[k]||0)+v; bits.push(`${v} ${k}`);
  }
  const parts=[];
  if(bits.length) parts.push(`the village is ${bits.join(" and ")} better off`);
  if(crops.length) parts.push(`there ${crops.length>1?"are":"are"} ${crops.join(" and ")} to plant now`);
  return parts.length?` And ${parts.join(", and ")}.`:"";
}

/* ---------- circuit UI ---------- */
function renderCircuit(){
  const L=pz.L, r=circuitCheck(L,pz.paths);
  const cellPx=Math.min(48, Math.floor((Math.min(window.innerWidth,620)-46)/L.w));
  const sel=L.loads.find(l=>l.name===pz.sel);
  const myPath=pz.paths[pz.sel]||[];
  const started=myPath.length>0;

  let h=`<div class="card">
    <div class="pzhead"><div class="sysname">Board ${L.n}</div>
      <div class="condpct ${r.overSource?'neg':''}">bus ${r.total} / ${L.srcMax}A</div></div>
    <div class="pzteach">${L.teach}</div>

    <div class="sectionlbl" style="margin:10px 0 6px">Wiring which load?</div>
    <div class="pieces">`;
  for(const ld of L.loads){
    const lit=!!r.live[ld.name];
    h+=`<button class="piece ${pz.sel===ld.name?'sel':''}" data-sel="${ld.name}">
      ${ld.name} <span style="color:var(--ink-soft)">${ld.amps}A</span>
      <span style="color:${lit?'var(--leaf)':'var(--rust)'};font-size:10px"> ${lit?"lit":ld.req?"dark · needed":"dark · optional"}</span></button>`;
  }
  h+=`</div>
    <div class="blurb">${started
      ? `Tap a neighbouring cell to extend ${pz.sel}'s run. Tap a cell already on the run to cut back to it.`
      : `Tap the <b>BUS</b> to begin ${pz.sel}'s run.`}</div>

    <div class="grid" style="grid-template-columns:repeat(${L.w},${cellPx}px)">`;

  const onMy = (x,y)=>myPath.some(c=>c[0]===x&&c[1]===y);
  for(let y=0;y<L.h;y++)for(let x=0;x<L.w;x++){
    const k=cKey(x,y), capv=circuitCap(L,x,y), cur=r.map[k]||0;
    const isSrc = L.src[0]===x&&L.src[1]===y;
    const ld = L.loads.find(l=>l.p[0]===x&&l.p[1]===y);
    let cls="cell", body="", extra="";
    if(capv===0){ cls+=" blk"; }
    else if(isSrc){ cls+=" src"; body="BUS"; }
    else if(ld){
      cls+=" load"+(r.live[ld.name]?" lit":"");
      body=`<span style="font-size:9px">${ld.name}</span>`;
      extra=`<span class="amp">${ld.amps}A</span>`;
    } else if(L.junctions && L.junctions[k]!==undefined){
      const need=L.junctions[k];
      const energized = cur>=need;
      cls+= energized ? " jopen" : " jcold";
      if(cur>capv) cls+=" over";
      body = `<b>${cur}</b>`;
      extra = `<span class="cap">relay ≥${need}</span>`;
    } else {
      if(cur>capv) cls+=" over";
      else if(cur>0) cls+=" on";
      body = cur>0 ? `<b>${cur}</b>` : "";
      if(capv<99) extra=`<span class="cap">max ${capv}</span>`;
    }
    if(!isSrc && !ld && onMy(x,y)) extra+=`<span style="position:absolute;top:1px;right:2px;font-size:8px;color:var(--leaf)">●</span>`;
    h+=`<div class="${cls}" data-c="${x},${y}" style="height:${cellPx}px">${body}${extra}</div>`;
  }
  h+=`</div>`;

  let msg="", cls="pzstatus";
  if(r.solved){ msg="Every required load is lit and nothing is burning."; cls+=" good"; }
  else if(r.over.length){ msg="A cell is carrying more current than it can. It will burn."; cls+=" bad"; }
  else if(r.overSource){ msg=`The bus can only give ${L.srcMax}A. Something has to go dark.`; cls+=" bad"; }
  else if(r.coldJunctions&&r.coldJunctions.length){ msg=`A relay isn't carrying enough current to close. Route more through it.`; cls+=" bad"; }
  else if(r.missing.length){ msg=`Still dark: ${r.missing.join(", ")}.`; }
  h+=`<div class="${cls}">${msg}</div>
    <div class="pzbar">
      <button data-act="undo">Undo a step</button>
      <button data-act="drop">Unwire ${pz.sel}</button>
      <button data-act="clear">Clear the board</button>
      <button data-act="back">Leave it</button>
      ${r.solved?`<button data-act="commit" style="border-color:var(--leaf);color:var(--leaf);font-weight:600">Wire it in</button>`:""}
    </div>
    <div class="blurb" style="margin-top:9px;line-height:1.5">
      Numbers in a cell are the current running through it. Where two runs share a cell, the current <b>adds up</b>.
      <span style="opacity:.7">max n</span> is what that cell can carry before it burns. Dark cells are burnt through — nothing crosses them.
      ${L.junctions?`<br><span style="color:var(--sun)">A <b>relay</b> cell (marked <b>relay ≥n</b>) only closes when at least n current runs through it. Route enough through to wake it.</span>`:""}
    </div>
  </div>`;
  $("tab-works").innerHTML=h;

  $("tab-works").querySelectorAll("[data-sel]").forEach(b=>{ b.onclick=()=>{pz.sel=b.dataset.sel; renderCircuit();}; });
  $("tab-works").querySelectorAll("[data-c]").forEach(el=>{
    el.onclick=()=>{
      const [x,y]=el.dataset.c.split(",").map(Number);
      if(circuitCap(L,x,y)===0) return;
      const name=pz.sel;
      let p=pz.paths[name]||[];
      if(L.src[0]===x&&L.src[1]===y){ pz.paths[name]=[[x,y]]; renderCircuit(); return; }
      if(!p.length) return;
      const idx=p.findIndex(c=>c[0]===x&&c[1]===y);
      if(idx>=0){ pz.paths[name]=p.slice(0,idx+1); renderCircuit(); return; }
      const last=p[p.length-1];
      if(!circuitAdj(last,[x,y])) return;
      if(last[0]===sel.p[0] && last[1]===sel.p[1]) return;          // already arrived
      const otherLoad=L.loads.find(l=>l.name!==name && l.p[0]===x && l.p[1]===y);
      if(otherLoad) return;                                          // can't cross another terminal
      pz.paths[name]=[...p,[x,y]];
      renderCircuit();
    };
  });
  $("tab-works").querySelectorAll("[data-act]").forEach(b=>{
    b.onclick=()=>{
      const a=b.dataset.act;
      if(a==="undo"){ const p=pz.paths[pz.sel]; if(p&&p.length>1) p.pop(); else delete pz.paths[pz.sel]; renderCircuit(); }
      else if(a==="drop"){ delete pz.paths[pz.sel]; renderCircuit(); }
      else if(a==="clear"){ pz.paths={}; renderCircuit(); }
      else if(a==="back"){ closePuzzle(); }
      else if(a==="commit"){
        S.puz.circuit++;
        const extra=grantReward("circuit");
        {
          const solvers=[byId("nadia"),byId("ilya")].filter(p=>p&&p.status!=="away");
          const credit = solvers.length ? solvers.map(p=>p.name).join(" and ")
                       : (bestPresent("hands") ? bestPresent("hands").name : "Somebody");
          S.pending.push(`${credit} got board ${L.n} routed, and it held.${extra}`);
        }
        pz=null; store.save(S); renderAll();
      }
    };
  });
}

/* ---------- watershed UI ---------- */
const DIRGLYPH={E:"→",W:"←",S:"↓",N:"↑"};
function waterUsed(){ const u={}; for(const v of Object.values(pz.placed)){ const k=v.split(":")[0]; u[k]=(u[k]||0)+1; } return u; }
function wetShade(v,maxv){
  if(v<=0.05) return "transparent";
  const t=Math.min(1, v/Math.max(1,maxv));
  const a=0.10+0.55*t;
  return `rgba(95,134,154,${a.toFixed(2)})`;
}
function renderWater(){
  const L=pz.L, r=waterSim(L,pz.placed), used=waterUsed();
  const cellPx=Math.min(56, Math.floor((Math.min(window.innerWidth,620)-46)/L.w));
  const maxArr=Math.max(...Object.values(r.arrive));

  let h=`<div class="card">
    <div class="pzhead"><div class="sysname">Season ${L.n}</div>
      <div class="condpct">rain ${L.rain} on every cell${L.cisternTarget?` · stored ${r.totalStored.toFixed(0)}/${L.cisternTarget}`:""}</div></div>
    <div class="pzteach">${L.teach}</div>

    <div class="banner" style="margin:8px 0 10px;font-style:normal;font-family:var(--sans);font-size:12px;line-height:1.55">
      <b>How the water moves.</b> Rain falls everywhere, then runs to whichever neighbouring cell is <b>lower</b> —
      splitting evenly if several are. The small grey number is the <b>height</b> of the ground; the big blue number is
      how much water <b>passes through</b> that cell. Arrows show where it goes next.
      Your beds sit up on the dry shoulder, so the water rushes past them into the valley. Your job is to send it their way.
      ${L.scour?"<br><b>This season:</b> a channel carrying more than 9 will scour the soil.":""}
    </div>

    <div class="sectionlbl" style="margin:0 0 6px">What to place</div>
    <div class="pieces">`;
  for(const [k,def] of Object.entries(L.budget)){
    const left=def-(used[k]||0);
    h+=`<button class="piece ${pz.sel===k?'sel':''} ${left<=0?'out':''}" data-p="${k}">${WATER_PIECES[k].name} <span style="color:var(--ink-soft)">${left} left</span></button>`;
  }
  h+=`</div><div class="blurb" style="margin-bottom:6px">${WATER_PIECES[pz.sel]?WATER_PIECES[pz.sel].blurb:""}</div>`;
  if(pz.sel==="channel"){
    h+=`<div class="sectionlbl" style="margin:6px 0 6px">Send its water…</div><div class="pieces">`;
    for(const d of ["N","W","E","S"]) h+=`<button class="piece ${pz.dir===d?'sel':''}" data-d="${d}" style="min-width:44px;text-align:center;font-size:16px">${DIRGLYPH[d]}</button>`;
    h+=`</div><div class="blurb" style="margin-bottom:6px">A channel only runs downhill. Point it uphill and it takes the lowest way instead.</div>`;
  }

  h+=`<div class="grid" style="grid-template-columns:repeat(${L.w},${cellPx}px)">`;
  for(let y=0;y<L.h;y++)for(let x=0;x<L.w;x++){
    const k=cKey(x,y), piece=pz.placed[k];
    const bed=L.beds.find(b=>b.p[0]===x&&b.p[1]===y);
    const br=r.beds.find(b=>b.p[0]===x&&b.p[1]===y);
    const arr=r.arrive[k]||0;
    let cls="cell", body="", style=`height:${cellPx}px`;

    if(bed){
      cls+=" bed"+(br.drowned?" drown":br.dry?" dry":"");
      body=`<span style="font-size:9.5px;text-align:center;line-height:1.15">bed<br><b>${br.got.toFixed(0)}</b><span style="opacity:.6">/${bed.min}–${bed.max}</span></span>`;
    } else {
      style+=`;background:${wetShade(arr,maxArr)}`;
      if(piece){
        const base=piece.split(":")[0];
        const g = base==="channel"?DIRGLYPH[piece.split(":")[1]] : base==="swale"?"≈" : base==="cistern"?"▣" : "▲";
        body=`<span class="glyph" style="color:var(--ink)">${g}</span>`;
        if(r.scoured.includes(k)) cls+=" over";
      } else {
        body=`<b style="color:#2f4a58;font-size:11px">${arr>=0.5?arr.toFixed(0):""}</b>`;
      }
      if(r.flooded.includes(k)) cls+=" over";
      const out=(r.dirs[k]||[]).map(d=>DIRGLYPH[d]).join("");
      if(out && !piece) body+=`<span style="position:absolute;bottom:1px;right:2px;font-size:9px;color:#2f4a58;opacity:.75">${out}</span>`;
    }
    body+=`<span class="elev">${L.elev[y][x]}</span>`;
    h+=`<div class="${cls}" data-w="${x},${y}" style="${style}">${body}</div>`;
  }
  h+=`</div>`;

  let msg="", cls="pzstatus";
  if(r.solved){ msg="Every bed drinks its fill. Nothing floods, nothing scours."; cls+=" good"; }
  else if(r.scoured.length){ msg="A channel is carrying too much — it's cutting into the soil. Slow the water first."; cls+=" bad"; }
  else if(r.flooded.length){ msg="Water is standing where it can't get out."; cls+=" bad"; }
  else if(r.beds.some(b=>b.drowned)){ msg="A bed is drowning. Send some of that water elsewhere."; cls+=" bad"; }
  else if(r.beds.some(b=>b.dry)){ msg="A bed is still thirsty. Cut it a channel from higher ground."; }
  else if(r.totalStored<L.cisternTarget){ msg=`Store ${(L.cisternTarget-r.totalStored).toFixed(0)} more for the dry weeks.`; }
  h+=`<div class="${cls}">${msg}</div>
    <div class="pzbar">
      <button data-act="clear">Clear the ground</button>
      <button data-act="back">Leave it</button>
      ${r.solved?`<button data-act="commit" style="border-color:var(--leaf);color:var(--leaf);font-weight:600">Cut it in</button>`:""}
    </div>
    <div class="blurb" style="margin-top:9px">Tap a cell to place the selected piece; tap it again to lift it. ▲ berm · ≈ swale · ▣ cistern · arrow channel</div>
  </div>`;
  $("tab-works").innerHTML=h;

  $("tab-works").querySelectorAll("[data-p]").forEach(b=>{ b.onclick=()=>{pz.sel=b.dataset.p; renderWater();}; });
  $("tab-works").querySelectorAll("[data-d]").forEach(b=>{ b.onclick=()=>{pz.dir=b.dataset.d; renderWater();}; });
  $("tab-works").querySelectorAll("[data-w]").forEach(el=>{
    el.onclick=()=>{
      const [x,y]=el.dataset.w.split(",").map(Number);
      const k=cKey(x,y);
      if(L.beds.some(b=>b.p[0]===x&&b.p[1]===y)) return;
      if(pz.placed[k]){ delete pz.placed[k]; renderWater(); return; }
      const u=waterUsed(); const left=L.budget[pz.sel]-(u[pz.sel]||0);
      if(left<=0) return;
      pz.placed[k] = pz.sel==="channel" ? "channel:"+pz.dir : pz.sel;
      renderWater();
    };
  });
  $("tab-works").querySelectorAll("[data-act]").forEach(b=>{
    b.onclick=()=>{
      const a=b.dataset.act;
      if(a==="clear"){ pz.placed={}; renderWater(); }
      else if(a==="back"){ closePuzzle(); }
      else if(a==="commit"){
        S.puz.water++;
        addRestore("aquifer", RESTORE_IN.waterLevel);   // slowing and sinking water heals the water table
        const extra=grantReward("water");
        {
          const ora=byId("ora");
          const credit = (ora && ora.status!=="away") ? "Ora"
                       : (bestPresent("green") ? bestPresent("green").name : "Somebody");
          S.pending.push(`The season's water went where it was told. ${credit} walked the swales twice, grinning.${extra}`);
        }
        pz=null; store.save(S); renderAll();
      }
    };
  });
}
/* ---------- seed frame UI ---------- */
const LIGHT_TINT = ["#2b2f26","#4a5340","#8a9b6e","#d8c86a"];  // 0..3, dark to bright
function seedUsed(){ const u={}; for(const id of Object.values(pz.placed)) u[id]=(u[id]||0)+1; return u; }
function renderSeed(){
  const L=pz.L, r=seedCheck(L,pz.placed), used=seedUsed();
  const cellPx=Math.min(58, Math.floor((Math.min(window.innerWidth,620)-46)/L.w));

  // which cells are in violation, for tinting
  const badLight=new Set(r.wrongLight);
  const lonely=new Set(r.lonely);
  const rivalCells=new Set();
  for(const pair of r.rivalPairs){ const [a,b]=pair.split("|"); rivalCells.add(a); rivalCells.add(b); }

  let h=`<div class="card">
    <div class="pzhead"><div class="sysname">Seed frame ${L.n}</div>
      <div class="condpct">${r.filled}/${r.total} slots</div></div>
    <div class="pzteach">${L.teach}</div>

    <div class="banner" style="margin:8px 0 10px;font-style:normal;font-family:var(--sans);font-size:12px;line-height:1.55">
      <b>Sorting the seed.</b> Each slot has a <b>light</b> value (the coloured band): a seed only takes if the light suits it.
      Some seeds are <b>companions</b> — they must sit next to a friend. Some are <b>rivals</b> — they must never touch.
      Fill every slot so light, friends and rivals all agree.
    </div>

    <div class="sectionlbl" style="margin:0 0 6px">The seeds</div>
    <div class="pieces">`;
  for(const [id,c] of Object.entries(L.supply)){
    const left=c-(used[id]||0);
    const s=SEEDLINGS[id];
    h+=`<button class="piece ${pz.sel===id?'sel':''} ${left<=0?'out':''}" data-s="${id}">
      <span style="font-size:15px">${s.glyph}</span> ${s.name} <span style="color:var(--ink-soft)">${left}</span></button>`;
  }
  h+=`</div>`;

  // selected seed's rules
  if(pz.sel){
    const s=SEEDLINGS[pz.sel];
    const comps=SEED_COMPANION.filter(p=>p.includes(pz.sel)).map(p=>p[0]===pz.sel?p[1]:p[0]).filter(pt=>(L.supply[pt]||0)>0);
    const rivs=SEED_RIVAL.filter(p=>p.includes(pz.sel)).map(p=>p[0]===pz.sel?p[1]:p[0]).filter(pt=>(L.supply[pt]||0)>0);
    h+=`<div class="blurb" style="margin-bottom:6px">
      <b>${s.name}</b> — wants light ${s.light[0]}–${s.light[1]}.
      ${comps.length?` Friends with ${comps.map(x=>SEEDLINGS[x].name.toLowerCase()).join(", ")} (needs one beside it).`:""}
      ${rivs.length?` Rivals with ${rivs.map(x=>SEEDLINGS[x].name.toLowerCase()).join(", ")} (never adjacent).`:""}
    </div>`;
  }

  // the frame grid: only slot cells are interactive; non-slot cells are blank
  h+=`<div class="grid" style="grid-template-columns:repeat(${L.w},${cellPx}px)">`;
  for(let y=0;y<L.h;y++)for(let x=0;x<L.w;x++){
    const slot=seedSlotAt(L,x,y);
    const k=cKey(x,y);
    if(!slot){
      h+=`<div class="cell" style="height:${cellPx}px;background:transparent;border-color:transparent"></div>`;
      continue;
    }
    const id=pz.placed[k];
    const tint=LIGHT_TINT[slot.light];
    let ring="var(--line)";
    if(id){
      if(badLight.has(k)||rivalCells.has(k)) ring="var(--rust)";
      else if(lonely.has(k)) ring="var(--sun)";
      else ring="var(--leaf)";
    }
    const glyph = id ? `<span style="font-size:20px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)">${SEEDLINGS[id].glyph}</span>` : "";
    h+=`<div class="cell" data-seed="${x},${y}" style="height:${cellPx}px;background:${tint};border:2px solid ${ring};cursor:pointer">
      ${glyph}
      <span style="position:absolute;top:1px;left:3px;font-size:9px;color:rgba(255,255,255,.75)">☀${slot.light}</span>
    </div>`;
  }
  h+=`</div>`;

  // status line
  let msg="", cls="pzmsg";
  if(r.solved){ msg="Every seed suits its light, sits by a friend, and clear of its rivals."; cls+=" good"; }
  else if(r.overSupply.length){ msg="You've placed more of a seed than you have."; cls+=" bad"; }
  else if(r.wrongLight.length){ msg="A seed sits in the wrong light (outlined in rust)."; cls+=" bad"; }
  else if(r.rivalPairs.length){ msg="Rivals are touching (outlined in rust). Move one apart."; cls+=" bad"; }
  else if(r.lonely.length){ msg="A seed needs a friend beside it (outlined in amber)."; }
  else if(r.empties.length){ msg=`${r.empties.length} slot${r.empties.length>1?"s":""} still empty.`; }
  h+=`<div class="${cls}" style="min-height:18px;margin-top:4px;font-size:12.5px;color:${r.solved?'var(--leaf)':cls.includes('bad')?'var(--rust)':'var(--ink-soft)'}">${msg}</div>`;

  h+=`<div class="pzbar">
      <button data-act="clear">Clear the frame</button>
      <button data-act="back">Leave it</button>
      ${r.solved?`<button data-act="commit" style="border-color:var(--leaf);color:var(--leaf);font-weight:600">Sort it in</button>`:""}
    </div>
    <div class="blurb" style="margin-top:9px">Pick a seed, then tap a slot to place it; tap a filled slot to lift it. The band colour is the slot's light.</div>
  </div>`;
  $("tab-works").innerHTML=h;

  $("tab-works").querySelectorAll("[data-s]").forEach(b=>{ b.onclick=()=>{ pz.sel=b.dataset.s; renderSeed(); }; });
  $("tab-works").querySelectorAll("[data-seed]").forEach(el=>{
    el.onclick=()=>{
      const [x,y]=el.dataset.seed.split(",").map(Number);
      const k=cKey(x,y);
      if(pz.placed[k]){ delete pz.placed[k]; renderSeed(); return; }
      if(!pz.sel) return;
      const u=seedUsed(); const left=(L.supply[pz.sel]||0)-(u[pz.sel]||0);
      if(left<=0) return;
      pz.placed[k]=pz.sel;
      renderSeed();
    };
  });
  $("tab-works").querySelectorAll("[data-act]").forEach(b=>{
    b.onclick=()=>{
      const a=b.dataset.act;
      if(a==="clear"){ pz.placed={}; renderSeed(); }
      else if(a==="back"){ closePuzzle(); }
      else if(a==="commit"){
        S.puz.seed++;
        const extra=grantReward("seed");
        S.pending.push(`The seed frame is sorted — every drawer labelled, every companion noted.${extra}`);
        pz=null; store.save(S); renderAll();
      }
    };
  });
}

/* ---------- radio UI ---------- */
/* ---------- signal UI (the radio) ---------- */
function renderSignal(){
  const L=pz.L, r=signalCheck(L,pz.placed);
  const cellPx=Math.min(58, Math.floor((Math.min(window.innerWidth,620)-46)/L.w));

  let h=`<div class="card">
    <div class="pzhead"><div class="sysname">Frequency ${L.n}</div>
      <div class="condpct ${r.used>L.budget?'neg':''}">${L.budget-r.used} node${(L.budget-r.used)===1?"":"s"} left</div></div>
    <div class="pzteach">${L.teach}</div>

    <div class="grid" style="grid-template-columns:repeat(${L.w},${cellPx}px)">`;

  for(let y=0;y<L.h;y++)for(let x=0;x<L.w;x++){
    const k=cKey(x,y);
    const isBlk=L.blocked.some(b=>b[0]===x&&b[1]===y);
    const rec=r.recStatus.find(rc=>rc.x===x&&rc.y===y);
    const hasNode=pz.placed[k];
    const sig=r.map[k]||0;
    let cls="cell", body="", style=`height:${cellPx}px;`;
    if(sig>0 && !isBlk && !rec) style+=`background:rgba(147,164,131,${Math.min(0.8,sig*0.2)});`;
    if(isBlk && !rec){ cls+=" blk"; }
    else if(rec){
      cls+=" load"+(rec.match?" lit":rec.over?" over":"");
      body=`<span style="font-size:15px;font-weight:700">${rec.got}</span><span class="cap">/ ${rec.v}</span>`;
    } else if(hasNode){
      cls+=" on";
      body=`<span style="font-size:20px;color:var(--leaf);font-weight:700">+</span>`;
    } else if(sig>0){
      body=`<span style="font-size:11px;opacity:.45">${sig}</span>`;
    }
    h+=`<div class="${cls}" data-rx="${x},${y}" style="${style}">${body}</div>`;
  }
  h+=`</div>`;

  let msg="", mcls="pzstatus";
  if(r.solved){ msg="Every receiver is matched exactly, and no node spent past the budget."; mcls+=" good"; }
  else if(r.recStatus.some(rc=>rc.over)){ msg="Too much signal hitting a receiver (highlighted)."; mcls+=" bad"; }
  else if(r.used>L.budget){ msg=`Too many nodes out at once — only ${L.budget}.`; mcls+=" bad"; }
  else { msg=`Place ${L.budget-r.used} more node${(L.budget-r.used)===1?"":"s"} to match the targets.`; }
  h+=`<div class="${mcls}">${msg}</div>
    <div class="pzbar">
      <button data-act="clear">Clear the grid</button>
      <button data-act="back">Leave it</button>
      ${r.solved?`<button data-act="commit" style="border-color:var(--leaf);color:var(--leaf);font-weight:600">Lock the frequency</button>`:""}
    </div>
    <div class="blurb" style="margin-top:9px">Tap a space to place a node — it broadcasts to itself and the four cells around it, and overlapping fields add. Tap again to pull it up. A receiver needs its exact number, no more.</div>
  </div>`;
  $("tab-works").innerHTML=h;

  $("tab-works").querySelectorAll("[data-rx]").forEach(el=>{
    el.onclick=()=>{
      const [x,y]=el.dataset.rx.split(",").map(Number);
      const k=cKey(x,y);
      if(L.receivers.some(rc=>rc.x===x&&rc.y===y)) return;
      if(L.blocked.some(b=>b[0]===x&&b[1]===y)) return;
      if(pz.placed[k]) delete pz.placed[k];
      else { if(r.used>=L.budget) return; pz.placed[k]=true; }
      renderSignal();
    };
  });
  $("tab-works").querySelectorAll("[data-act]").forEach(b=>{
    b.onclick=()=>{
      const a=b.dataset.act;
      if(a==="clear"){ pz.placed={}; renderSignal(); }
      else if(a==="back"){ closePuzzle(); }
      else if(a==="commit"){
        S.puz.radio++;
        const extra=grantReward("radio");
        S.pending.push(`The frequency locked in clean and stayed there.${extra}`);
        pz=null; store.save(S); renderAll();
      }
    };
  });
}

/* ---------- patchwork UI ---------- */
function renderPatch(){
  const L=pz.L, r=patchCheck(L,pz.placed);
  const cellPx=Math.min(50, Math.floor((Math.min(window.innerWidth,620)-46)/L.w));

  let h=`<div class="card">
    <div class="pzhead"><div class="sysname">Draft ${L.n}</div>
      <div class="condpct">${L.leaks.length-r.leaksUncovered.length}/${L.leaks.length} sealed</div></div>
    <div class="pzteach">${L.teach}</div>

    <div class="sectionlbl" style="margin:0 0 6px">The patches</div>
    <div class="pieces">`;
  for(const [id,total] of Object.entries(L.supply)){
    const left=total-(r.used[id]||0);
    h+=`<button class="piece ${pz.sel===id?'sel':''} ${left<=0?'out':''}" data-patch="${id}">${PATCH_SHAPES[id].name} <span style="color:var(--ink-soft)">${left} left</span></button>`;
  }
  h+=`</div>`;

  h+=`<div class="grid" style="grid-template-columns:repeat(${L.w},${cellPx}px)">`;
  for(let y=0;y<L.h;y++)for(let x=0;x<L.w;x++){
    const k=cKey(x,y);
    const uids=r.map[k]||[];
    const isLeak=L.leaks.some(l=>l[0]===x&&l[1]===y);
    const isBlk=L.blocked.some(b=>b[0]===x&&b[1]===y);
    let cls="cell", style=`height:${cellPx}px;`;
    if(isBlk){ cls+=" blk"; }
    else if(isLeak && uids.length===0){ style+="background:#D9D2C5;box-shadow:inset 0 2px 6px rgba(168,91,56,.3);border-color:var(--rust);"; }
    else if(uids.length>0){
      cls+=" load"+(uids.length>1?" over":"");
      const myUid=uids[0];
      if((r.map[cKey(x,y-1)]||[]).includes(myUid)) style+="border-top-color:transparent;";
      if((r.map[cKey(x,y+1)]||[]).includes(myUid)) style+="border-bottom-color:transparent;";
      if((r.map[cKey(x-1,y)]||[]).includes(myUid)) style+="border-left-color:transparent;";
      if((r.map[cKey(x+1,y)]||[]).includes(myUid)) style+="border-right-color:transparent;";
    }
    h+=`<div class="${cls}" data-px="${x},${y}" style="${style}"></div>`;
  }
  h+=`</div>`;

  let msg="", mcls="pzstatus";
  if(r.solved){ msg="Every gap is sealed. Nothing overlaps, nothing covers a strut."; mcls+=" good"; }
  else if(r.overlaps.length){ msg="Patches are overlapping."; mcls+=" bad"; }
  else if(r.onBlocked.length){ msg="A patch covers a load-bearing strut."; mcls+=" bad"; }
  else if(r.leaksUncovered.length){ msg=`${r.leaksUncovered.length} draft${r.leaksUncovered.length>1?"s":""} still open.`; }
  h+=`<div class="${mcls}">${msg}</div>
    <div class="pzbar">
      <button data-act="clear">Strip the work</button>
      <button data-act="back">Leave it</button>
      ${r.solved?`<button data-act="commit" style="border-color:var(--leaf);color:var(--leaf);font-weight:600">Seal it</button>`:""}
    </div>
    <div class="blurb" style="margin-top:9px">Pick a patch, then tap a space to lay it down — its corner lands where you tap. Tap a laid patch to pull it back up.</div>
  </div>`;
  $("tab-works").innerHTML=h;

  $("tab-works").querySelectorAll("[data-patch]").forEach(b=>{ b.onclick=()=>{ pz.sel=b.dataset.patch; renderPatch(); }; });
  $("tab-works").querySelectorAll("[data-px]").forEach(el=>{
    el.onclick=()=>{
      const [x,y]=el.dataset.px.split(",").map(Number);
      const k=cKey(x,y);
      const uids=r.map[k]||[];
      if(uids.length>0){
        const toRemove=uids[0];
        pz.placed=pz.placed.filter(p=>p.uid!==toRemove);
        renderPatch();
        return;
      }
      if(!pz.sel) return;
      const left=(L.supply[pz.sel]||0)-(r.used[pz.sel]||0);
      if(left<=0) return;
      const def=PATCH_SHAPES[pz.sel];
      const isOOB=def.pts.some(pt=>{ const nx=x+pt[0], ny=y+pt[1]; return nx<0||nx>=L.w||ny<0||ny>=L.h; });
      if(isOOB) return;
      pz.placed.push({uid:pz.uid++, shape:pz.sel, x, y});
      renderPatch();
    };
  });
  $("tab-works").querySelectorAll("[data-act]").forEach(b=>{
    b.onclick=()=>{
      const a=b.dataset.act;
      if(a==="clear"){ pz.placed=[]; renderPatch(); }
      else if(a==="back"){ closePuzzle(); }
      else if(a==="commit"){
        S.puz.patch++;
        const extra=grantReward("patch");
        S.pending.push(`The patching is done. Another edge sealed against the winter.${extra}`);
        pz=null; store.save(S); renderAll();
      }
    };
  });
}

/* ---------- focus UI (heliostat calibration) ---------- */
function renderFocus(){
  const L=pz.L, r=focusCheck(L,pz.placed);
  const cellPx=Math.min(56, Math.floor((Math.min(window.innerWidth,620)-46)/L.w));

  let h=`<div class="card">
    <div class="pzhead"><div class="sysname">Array ${L.n}</div>
      <div class="condpct ${r.used>L.budget?'neg':''}">${L.budget-r.used} mirror${(L.budget-r.used)===1?"":"s"} left</div></div>
    <div class="pzteach">${L.teach}</div>

    <div style="position:relative;margin:10px auto 0;width:${L.w*cellPx}px">
      <svg style="position:absolute;inset:0;z-index:1;pointer-events:none" width="${L.w*cellPx}" height="${L.h*cellPx}">
        <polyline points="${r.pts.map(p=>`${p[0]*cellPx+cellPx/2},${p[1]*cellPx+cellPx/2}`).join(" ")}"
          stroke="var(--sun)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"
          style="filter:drop-shadow(0 0 4px var(--sun))"/>
      </svg>
      <div class="grid" style="grid-template-columns:repeat(${L.w},${cellPx}px);margin:0;position:relative;z-index:2">`;
  for(let y=0;y<L.h;y++)for(let x=0;x<L.w;x++){
    const k=cKey(x,y);
    const isSrc=L.src.x===x&&L.src.y===y;
    const isTgt=L.target.x===x&&L.target.y===y;
    const isBlk=L.blocked.some(b=>b[0]===x&&b[1]===y);
    const mirror=pz.placed[k];
    let cls="cell", body="", style=`height:${cellPx}px;`;
    if(isBlk){ cls+=" blk"; }
    else if(isSrc){ cls+=" src"; body="☀"; style+="font-size:18px;"; }
    else if(isTgt){ cls+=" load"+(r.hitTarget?" lit":""); body="▣"; style+="font-size:18px;"; }
    else if(mirror){ body=`<span style="font-size:22px;font-weight:700;color:var(--ink)">${mirror}</span>`; }
    h+=`<div class="${cls}" data-fx="${x},${y}" style="${style}">${body}</div>`;
  }
  h+=`</div></div>`;

  let msg="", mcls="pzstatus";
  if(r.solved){ msg="The light connects. The array hums."; mcls+=" good"; }
  else if(r.hitTarget && r.used>L.budget){ msg="Connected, but with too many mirrors."; mcls+=" bad"; }
  else if(r.used>L.budget){ msg="Out of mirrors."; mcls+=" bad"; }
  else { msg=`${L.budget-r.used} mirror${(L.budget-r.used)===1?"":"s"} left to place.`; }
  h+=`<div class="${mcls}" style="margin-top:12px">${msg}</div>
    <div class="pzbar">
      <button data-act="clear">Clear the field</button>
      <button data-act="back">Leave it</button>
      ${r.solved?`<button data-act="commit" style="border-color:var(--leaf);color:var(--leaf);font-weight:600">Lock the alignment</button>`:""}
    </div>
    <div class="blurb" style="margin-top:9px">Tap a space to place a mirror (/). Tap again to flip it (\\). Tap a third time to clear it.</div>
  </div>`;
  $("tab-works").innerHTML=h;

  $("tab-works").querySelectorAll("[data-fx]").forEach(el=>{
    el.onclick=()=>{
      const [x,y]=el.dataset.fx.split(",").map(Number);
      const k=cKey(x,y);
      if(L.src.x===x&&L.src.y===y) return;
      if(L.target.x===x&&L.target.y===y) return;
      if(L.blocked.some(b=>b[0]===x&&b[1]===y)) return;
      if(!pz.placed[k]) pz.placed[k]="/";
      else if(pz.placed[k]==="/") pz.placed[k]="\\";
      else delete pz.placed[k];
      renderFocus();
    };
  });
  $("tab-works").querySelectorAll("[data-act]").forEach(b=>{
    b.onclick=()=>{
      const a=b.dataset.act;
      if(a==="clear"){ pz.placed={}; renderFocus(); }
      else if(a==="back"){ closePuzzle(); }
      else if(a==="commit"){
        S.puz.focus++;
        const extra=grantReward("focus");
        S.pending.push(`The array is aligned. Sunlight hits the boiler squarely.${extra}`);
        pz=null; store.save(S); renderAll();
      }
    };
  });
}
